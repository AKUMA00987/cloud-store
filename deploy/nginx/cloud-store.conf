# Cloud Store Nginx template
# Phase 13 only standardizes reverse proxy structure.
# Real domain name and TLS certificate wiring belong to Phase 14.

upstream cloud_store_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 6m;

    location / {
        proxy_pass http://cloud_store_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

