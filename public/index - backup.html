<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云田野 - 自家地里种的</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    * {
      font-family: system-ui, -apple-system, sans-serif
    }

    body {
      background: #F5F0E8;
      max-width: 428px;
      margin: 0 auto;
      min-height: 100vh
    }

    .btn:active {
      transform: scale(0.97)
    }

    .level-lv1 {
      background: #E8F5EC;
      color: #2D9D4E
    }

    .level-lv2 {
      background: #E8F5EC;
      color: #1E7A3A
    }

    .level-lv3 {
      background: #FCEBD8;
      color: #C4602A
    }

    .level-lv4 {
      background: #2D9D4E;
      color: #fff
    }
  </style>
</head>

<body class="bg-[#F5F0E8] pb-16">
  <div id="app"></div>
  <nav id="nav" class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2"
    style="max-width:428px;margin:0 auto">
    <button onclick="go('home')" class="flex flex-col items-center p-2"><i data-lucide="home" class="w-5 h-5"></i><span
        class="text-xs">首页</span></button>
    <button onclick="go('category')" class="flex flex-col items-center p-2"><i data-lucide="grid-3x3"
        class="w-5 h-5"></i><span class="text-xs">分类</span></button>
    <button onclick="go('cart')" class="flex flex-col items-center p-2 relative"><i data-lucide="shopping-cart"
        class="w-5 h-5"></i><span class="text-xs">购物车</span><span id="cart-badge"
        class="hidden absolute -top-1 right-2 bg-[#E07B39] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">0</span></button>
    <button onclick="go('profile')" class="flex flex-col items-center p-2"><i data-lucide="user"
        class="w-5 h-5"></i><span class="text-xs">我的</span></button>
  </nav>
  <script>
    // === DATA ===
    const PRODUCTS = [
      {
        id: 1, name: '王大爷家的土鸡蛋', price: 45, orig: 58, unit: '30枚', img: 'https://images.unsplash.com/photo-1582722872445-44dc5f7e3c8f?w=400', cat: 'egg', tags: ['热销', '有机'], sales: 856, farmer: '王建国', village: '青山县王家村', harvest: '2026-03-24', trace: [
          { stage: '采摘', time: '06:30', desc: '清晨露水未干时采摘', op: '王建国', done: true },
          { stage: '打包', time: '08:00', desc: '纸格独立保护，放入溯源卡', op: '张姐', done: true },
          { stage: '配送发出', time: '10:00', desc: '专车配送，预计14:00送达', op: '配送员小陈', done: false },
        ]
      },
      {
        id: 2, name: '李婶的有机青菜', price: 12, orig: 16, unit: '500g', img: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400', cat: 'veg', tags: ['当日采摘', '有机'], sales: 432, farmer: '李秀英', village: '青山县李家村', harvest: '2026-03-24', trace: [
          { stage: '采摘', time: '06:00', desc: '新鲜采摘', op: '李秀英', done: true },
          { stage: '打包', time: '08:30', desc: '保鲜膜+纸袋包装', op: '李秀英', done: true },
          { stage: '配送发出', time: '10:00', desc: '当日发出', op: '配送员小陈', done: false },
        ]
      },
      {
        id: 3, name: '老赵家的山地苹果', price: 38, orig: 48, unit: '5斤', img: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400', cat: 'fruit', tags: ['热销'], sales: 298, farmer: '赵德明', village: '青山县赵家坡', harvest: '2026-03-20', trace: [
          { stage: '采摘', time: '07:00', desc: '山泉水灌溉，自然成熟', op: '赵德明', done: true },
          { stage: '打包', time: '09:00', desc: '纸箱防震包装', op: '赵德明', done: true },
          { stage: '配送发出', time: '14:00', desc: '已发出', op: '配送员小陈', done: false },
        ]
      },
      {
        id: 4, name: '张家村的土蜂蜜', price: 88, orig: 108, unit: '500g', img: 'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=400', cat: 'processed', tags: ['有机', '新品'], sales: 156, farmer: '张怀恩', village: '青山县张家村', harvest: '2026-03-15', trace: [
          { stage: '采蜜', time: '全天', desc: '深山野蜂蜜，一年一取', op: '张怀恩', done: true },
          { stage: '灌装', time: '08:00', desc: '玻璃瓶灌装，密封', op: '张怀恩', done: true },
          { stage: '配送发出', time: '10:00', desc: '发出', op: '配送员小陈', done: false },
        ]
      },
      {
        id: 5, name: '刘大爷的五常大米', price: 68, orig: 82, unit: '5kg', img: 'https://images.unsplash.com/photo-1536304993881-ff6e9eefa2a6?w=400', cat: 'grain', tags: ['有机', '热销'], sales: 512, farmer: '刘广福', village: '五常市刘家屯', harvest: '2026-03-10', trace: [
          { stage: '收割', time: '09:00', desc: '自留种，农家肥种植', op: '刘广福', done: true },
          { stage: '晾晒', time: '12:00', desc: '自然晾晒3天', op: '刘广福', done: true },
          { stage: '碾米', time: '14:00', desc: '传统碾米，不抛光不打蜡', op: '刘广福', done: true },
          { stage: '打包发出', time: '10:00', desc: '牛皮纸袋包装，发出', op: '配送员小陈', done: false },
        ]
      },
    ];
    const CATEGORIES = [
      { id: 'veg', name: '时令蔬菜', icon: '🥬' },
      { id: 'egg', name: '散养禽蛋', icon: '🥚' },
      { id: 'fruit', name: '新鲜水果', icon: '🍎' },
      { id: 'grain', name: '五谷杂粮', icon: '🌾' },
      { id: 'processed', name: '加工制品', icon: '🍯' },
    ];
    const PRODUCT_TAG_OPTIONS = ['热销', '有机', '新品', '精选'];
    const BANNERS = [
      { title: '春日新鲜直供', sub: '当日采摘，当日配送', img: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800' },
      { title: '新人首单礼', sub: '满50减10元', img: 'https://images.unsplash.com/photo-1490885578174-acda8905c2c6?w=800' },
    ];
    const ANNOUNCEMENTS = [
      { text: '周二、周五统一发货，请提前完成下单', active: true },
      { text: '今日时令蔬菜已补货，可直接下单', active: true }
    ];
    // === STATE ===
    let user = null, cart = [], view = 'home', cat = '', orders = [], member = { levelId: 'normal', points: 0, totalSpent: 0 }, paramId = 0;
    var productsState = [];
    var productsLoaded = false;
    var bannersState = [];
    var announcementsState = [];
    var usersState = {};
    var couponTemplatesState = [];
    var adminProductExpandState = {};
    var farmerProductExpandState = {};
    var couponRecipientState = { templateId: '', keyword: '', roleFilter: 'all', selectedUsers: {} };
    var activeBannerIndex = 0;
    var bannerAutoTimer = null;

    // === HELPERS ===
    // 统一格式化价格，避免页面里重复拼接金额字符串。
    const fmt = n => '¥' + Number(n || 0).toFixed(2);
    const $ = id => document.getElementById(id);
    const historyStack = [];
    // 页面路由切换后统一回到顶部，方便从新页面开头重新浏览内容。
    function scrollPageToTop() {
      try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch (error) { window.scrollTo(0, 0); }
    }
    // 详情页等二级页面使用 pushView，方便返回时恢复上一个页面和参数。
    const pushView = (v, id = 0) => { historyStack.push(view + '|' + paramId); view = v; paramId = id; location.hash = '/' + v + (id ? '/' + id : ''); render(); scrollPageToTop(); };
    // 一级页面直接 go，避免无参数页面残留旧的 paramId。
    const go = v => { view = v; paramId = 0; location.hash = '/' + v; render(); scrollPageToTop(); };
    const back = () => { if (historyStack.length > 0) { const prev = historyStack.pop().split('|'); view = prev[0]; paramId = parseInt(prev[1]) || 0; location.hash = '/' + view + (paramId ? '/' + paramId : ''); render(); scrollPageToTop(); } else window.history.back(); };
    const setCat = c => { cat = c; view = 'category'; render(); scrollPageToTop(); };
    const lvl = () => ({ id: 'normal', name: '普通用户' });
    const nextLvl = () => null;

    function badgeHtml() {
      return `<span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">普通用户</span>`;
    }

    // 兼容旧数据结构：历史商品可能还没有库存、上下架状态或农户账号字段。
    function normalizeProduct(p) {
      return Object.assign({
        cat: 'veg',
        stock: 30,
        off: false,
        tags: [],
        sales: 0,
        farmer: '待设置',
        farmerAccount: '',
        farmerUserId: 0,
        village: '待设置',
        harvest: new Date().toISOString().slice(0, 10),
        dispatchHours: 4,
        trace: []
      }, p || {});
    }

    function cloneProduct(product) {
      return normalizeProduct(Object.assign({}, product || {}, {
        tags: (product && product.tags ? product.tags : []).slice(),
        trace: (product && product.trace ? product.trace : []).map(function (item) { return Object.assign({}, item); })
      }));
    }

    function setProds(list) {
      productsState = (Array.isArray(list) ? list : []).map(normalizeProduct);
      return productsState;
    }

    function getProds() {
      return productsState;
    }

    async function fetchProducts() {
      var response = await fetch('/api/products');
      if (!response.ok) {
        var errorText = '商品数据加载失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var list = await response.json();
      productsLoaded = true;
      return setProds(list);
    }

    async function saveProductToServer(product, options) {
      var config = Object.assign({ refresh: true }, options || {});
      var response = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(product)
      });
      if (!response.ok) {
        var errorText = '商品保存失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var saved = await response.json();
      if (config.refresh) await fetchProducts();
      return saved;
    }

    function setBanners(list) {
      bannersState = (Array.isArray(list) ? list : []).map(normalizeBanner);
      if (activeBannerIndex >= bannersState.length) activeBannerIndex = 0;
      return bannersState;
    }

    function getBanners() {
      return bannersState;
    }

    async function fetchBanners() {
      var response = await fetch('/api/banners');
      if (!response.ok) {
        var errorText = 'Banner 数据加载失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var list = await response.json();
      return setBanners(list);
    }

    async function saveBannersToServer(list) {
      var response = await fetch('/api/banners', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify((list || []).map(function (item, index) {
          return Object.assign({}, normalizeBanner(item, index), { sortOrder: index });
        }))
      });
      if (!response.ok) {
        var errorText = 'Banner 保存失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var saved = await response.json();
      return setBanners(saved);
    }

    function setAnnouncements(list) {
      announcementsState = (Array.isArray(list) ? list : []).map(normalizeAnnouncement);
      return announcementsState;
    }

    function getAnnouncements() {
      return announcementsState;
    }

    async function fetchAnnouncements() {
      var response = await fetch('/api/announcements');
      if (!response.ok) {
        var errorText = '公告数据加载失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var list = await response.json();
      return setAnnouncements(list);
    }

    async function saveAnnouncementsToServer(list) {
      var response = await fetch('/api/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify((list || []).map(function (item, index) {
          return Object.assign({}, normalizeAnnouncement(item, index), { sortOrder: index });
        }))
      });
      if (!response.ok) {
        var errorText = '公告保存失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var saved = await response.json();
      return setAnnouncements(saved);
    }

    function clearBannerAutoRotation() {
      if (bannerAutoTimer) {
        clearTimeout(bannerAutoTimer);
        bannerAutoTimer = null;
      }
    }

    function scheduleBannerAutoRotation() {
      clearBannerAutoRotation();
      if (view !== 'home' || getBanners().length <= 1) return;
      bannerAutoTimer = setTimeout(function () {
        activeBannerIndex = (activeBannerIndex + 1) % getBanners().length;
        render();
      }, 4000);
    }

    function setActiveBanner(index) {
      var banners = getBanners();
      if (!banners.length) return;
      activeBannerIndex = Math.max(0, Math.min(index, banners.length - 1));
      render();
    }

    function getImageFromInputAsync(inputId, fallbackImage, folderName) {
      return new Promise(function (resolve, reject) {
        getImageFromInput(inputId, fallbackImage, folderName, resolve, reject);
      });
    }

    function renderLoadingView(text) {
      return '<div class="p-4"><div class="bg-white rounded-xl p-6 shadow text-center text-sm text-gray-500">' + (text || '商品数据加载中...') + '</div></div>';
    }

    function normalizeUserRecord(record) {
      return Object.assign({
        id: record && record.id ? Number(record.id) : undefined,
        username: '',
        roles: { isFarmer: false, isAdmin: false, farmerName: '' },
        addresses: [],
        coupons: [],
        selectedAddressId: '',
        selectedCouponId: '',
        cart: [],
        orders: [],
        member: { levelId: 'normal', points: 0, totalSpent: 0 },
        createdAt: new Date().toLocaleDateString('zh-CN')
      }, record || {}, {
        id: record && record.id ? Number(record.id) : undefined,
        roles: Object.assign({ isFarmer: false, isAdmin: false, farmerName: record && record.username ? record.username : '' }, record && record.roles || {}),
        addresses: Array.isArray(record && record.addresses) ? record.addresses : [],
        coupons: Array.isArray(record && record.coupons) ? record.coupons : [],
        cart: Array.isArray(record && record.cart) ? record.cart : [],
        orders: Array.isArray(record && record.orders) ? record.orders : [],
        member: Object.assign({ levelId: 'normal', points: 0, totalSpent: 0 }, record && record.member || {})
      });
    }

    function setUsers(list) {
      usersState = {};
      (Array.isArray(list) ? list : []).map(normalizeUserRecord).forEach(function (item) {
        usersState[item.username] = item;
      });
      if (user && usersState[user]) {
        cart = (usersState[user].cart || []).slice();
        orders = (usersState[user].orders || []).slice();
        member = Object.assign({ levelId: 'normal', points: 0, totalSpent: 0 }, usersState[user].member || {});
      }
      return getAllUsers();
    }

    function getUserRecord(uname) {
      var name = uname || user;
      return name && usersState[name] ? normalizeUserRecord(usersState[name]) : null;
    }

    async function fetchUsers() {
      var response = await fetch('/api/users');
      if (!response.ok) throw new Error('用户数据加载失败');
      var list = await response.json();
      return setUsers(list);
    }

    async function persistUserState(uname, override) {
      var name = uname || user;
      if (!name) return null;
      var base = normalizeUserRecord(Object.assign({}, getUserRecord(name) || { username: name }, override || {}));
      if (name === user) {
        base.cart = cart.map(function (item) { return Object.assign({}, item); });
        base.orders = orders.map(function (item) { return Object.assign({}, item); });
        base.member = Object.assign({ levelId: 'normal', points: 0, totalSpent: 0 }, member || {});
      }
      var response = await fetch('/api/users/' + encodeURIComponent(name) + '/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(base)
      });
      if (!response.ok) {
        var errorText = '用户数据保存失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var saved = normalizeUserRecord(await response.json());
      usersState[name] = saved;
      if (name === user) {
        cart = (saved.cart || []).slice();
        orders = (saved.orders || []).slice();
        member = Object.assign({ levelId: 'normal', points: 0, totalSpent: 0 }, saved.member || {});
      }
      return saved;
    }

    // 用户扩展资料统一走服务端 users 表缓存，角色、地址、优惠券都从同一份用户记录读取。
    function getUserMeta(uname) {
      var name = uname || user;
      if (!name) return { roles: { isFarmer: false, isAdmin: false }, addresses: [], coupons: [], createdAt: '' };
      var record = getUserRecord(name);
      if (!record) return { roles: { isFarmer: false, isAdmin: false }, addresses: [], coupons: [], createdAt: '' };
      return {
        roles: record.roles || { isFarmer: false, isAdmin: false },
        addresses: record.addresses || [],
        coupons: record.coupons || [],
        selectedAddressId: record.selectedAddressId || '',
        selectedCouponId: record.selectedCouponId || '',
        createdAt: record.createdAt || ''
      };
    }

    async function saveUserMetaAndWait(uname, meta) {
      var name = uname || user;
      var existing = normalizeUserRecord(Object.assign({}, getUserRecord(name) || { username: name }, meta || {}));
      usersState[name] = existing;
      return persistUserState(name, existing);
    }

    function saveUserMeta(uname, meta) {
      saveUserMetaAndWait(uname, meta).catch(function (error) {
        console.error(error);
      });
    }

    var DEFAULT_PRODUCT_IMAGE = 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400';

    function createProductDraft(overrides) {
      return Object.assign({
        name: '',
        price: '',
        unit: '',
        cat: 'veg',
        tags: [],
        stock: 0,
        harvest: new Date().toISOString().slice(0, 10),
        dispatchHours: 4,
        farmer: '',
        village: '',
        img: DEFAULT_PRODUCT_IMAGE
      }, overrides || {});
    }

    function normalizeBanner(item, index) {
      var fallback = BANNERS[index] || BANNERS[0] || { title: '首页Banner', sub: '新鲜农产品直达', img: DEFAULT_PRODUCT_IMAGE };
      return {
        id: item && item.id ? Number(item.id) : undefined,
        title: item && item.title ? item.title : fallback.title,
        sub: item && item.sub ? item.sub : fallback.sub,
        img: item && item.img ? item.img : fallback.img,
        linkType: item && item.linkType ? item.linkType : 'none',
        externalUrl: item && item.externalUrl ? item.externalUrl : '',
        productId: Number(item && item.productId || 0),
        sortOrder: Number(item && item.sortOrder != null ? item.sortOrder : index || 0)
      };
    }

    function normalizeAnnouncement(item, index) {
      var fallback = ANNOUNCEMENTS[index] || ANNOUNCEMENTS[0] || { text: '欢迎来到云田野，今天也有新鲜农产品直达。', active: true };
      return {
        id: item && item.id ? Number(item.id) : undefined,
        text: item && item.text ? item.text : fallback.text,
        active: item ? item.active !== false : true,
        linkType: item && item.linkType ? item.linkType : 'none',
        externalUrl: item && item.externalUrl ? item.externalUrl : '',
        productId: Number(item && item.productId || 0),
        sortOrder: Number(item && item.sortOrder != null ? item.sortOrder : index || 0)
      };
    }

    function getActiveAnnouncements() {
      return getAnnouncements().filter(function (item) { return item.active; });
    }

    function getOperationalLinkLabel(linkType) {
      if (linkType === 'product') return '内部商品';
      if (linkType === 'external') return '外部链接';
      return '无跳转';
    }

    function renderOperationalLinkFields(prefix, item, kindLabel) {
      var products = getProds();
      var linkType = item.linkType || 'none';
      var h = '<div class="mb-3"><div class="text-sm font-medium text-gray-700 mb-1">' + kindLabel + '跳转方式</div><select id="' + prefix + '-link-type" class="w-full p-2 border rounded-lg text-sm"><option value="none"' + (linkType === 'none' ? ' selected' : '') + '>无跳转</option><option value="product"' + (linkType === 'product' ? ' selected' : '') + '>内部商品</option><option value="external"' + (linkType === 'external' ? ' selected' : '') + '>外部链接</option></select></div>';
      h += '<div class="mb-3"><div class="text-sm font-medium text-gray-700 mb-1">绑定商品</div><select id="' + prefix + '-product-id" class="w-full p-2 border rounded-lg text-sm"><option value="0">不绑定商品</option>' + products.map(function (product) { return '<option value="' + product.id + '"' + (Number(item.productId || 0) === product.id ? ' selected' : '') + '>' + product.name + '</option>'; }).join('') + '</select></div>';
      h += '<div class="mb-3"><div class="text-sm font-medium text-gray-700 mb-1">外部链接</div><input id="' + prefix + '-external-url" value="' + (item.externalUrl || '') + '" placeholder="https://example.com" class="w-full p-2 border rounded-lg text-sm"></div>';
      return h;
    }

    function getCouponTypeLabel(type) {
      return type === 'discount' ? '折扣券' : '满减券';
    }

    function getCouponBenefitText(coupon) {
      if (!coupon) return '';
      if (coupon.type === 'discount') return Number(coupon.discountRate || 0).toFixed(1).replace(/\.0$/, '') + '折';
      return '满' + Number(coupon.minSpend || 0) + '减' + Number(coupon.amount || 0);
    }

    function calcCouponDiscount(coupon, subtotal) {
      if (!coupon) return 0;
      if (coupon.type === 'discount') {
        var rate = Number(coupon.discountRate || 0);
        if (rate < 1 || rate > 9.9) return 0;
        return Number((Number(subtotal || 0) * (10 - rate) / 10).toFixed(2));
      }
      return Number(subtotal || 0) >= Number(coupon.minSpend || 0) ? Number(coupon.amount || 0) : 0;
    }

    function getCouponMetaText(coupon) {
      return getCouponTypeLabel(coupon.type) + ' · ' + getCouponBenefitText(coupon);
    }

    function toggleFormTag(prefix, tag) {

      else {
        if (selected.length >= 2) { alert('每个商品最多展示 2 个标签'); return; }

    // 文件选择后先在本地预览，保存时再上传到服务端目录并回填访问地址。
    function previewImageUpload(inputId, previewId) {
      var input = document.getElementById(inputId);
      var preview = document.getElementById(previewId);
      if (!input || !preview || !input.files || !input.files[0] || typeof FileReader === 'undefined') return;
      var reader = new FileReader();
      reader.onload = function (event) {
        preview.src = event.target.result || DEFAULT_PRODUCT_IMAGE;
      };
      reader.readAsDataURL(input.files[0]);
    }

    function uploadImageDataUrl(dataUrl, fileName, folderName, done, fail) {
      fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dataUrl: dataUrl,
          fileName: fileName || 'image',
          folder: folderName || 'common'
        })
      }).then(function (response) {
        if (!response.ok) {
          return response.json().catch(function () {
            return { message: '图片上传失败' };
          }).then(function (payload) {
            throw new Error((payload && payload.message) || '图片上传失败');
          });
        }
        return response.json();
      }).then(function (payload) {
        done((payload && payload.url) || fallbackImage || DEFAULT_PRODUCT_IMAGE);
      }).catch(function (error) {
        if (fail) fail(error);
      });
    }

    function getImageFromInput(inputId, fallbackImage, folderName, done, fail) {
      var input = document.getElementById(inputId);
      if (!input || !input.files || !input.files[0] || typeof FileReader === 'undefined') {
        done(fallbackImage || DEFAULT_PRODUCT_IMAGE);
        return;
      }
      var file = input.files[0];
      var reader = new FileReader();
      reader.onload = function (event) {
        uploadImageDataUrl(event.target.result || '', file.name || 'image', folderName, done, fail);
      };
      reader.onerror = function () {
        if (fail) fail(new Error('图片读取失败'));
      };
      reader.readAsDataURL(file);
    }

    // 商品录入和编辑统一校验，避免后台字段和前台展示继续出现不一致。
    function validateProductPayload(payload) {
      if (!payload.name) return '请填写商品名称';
      if (!(payload.price > 0)) return '售价必须大于 0';
      if (!payload.unit) return '请填写商品单位';
      if (!payload.cat) return '请选择商品分类';
      if (isNaN(payload.stock) || payload.stock < 0) return '库存不能小于 0';
      if (!payload.harvest) return '请填写采摘日期';
      if (isNaN(payload.dispatchHours) || payload.dispatchHours <= 0) return '发货时效必须大于 0 小时';
      if (!payload.village) return '请填写来源产地';
      if ((payload.tags || []).length > 2) return '每个商品最多展示 2 个标签';
      return '';
    }

      var discountBlock = document.getElementById('coupon-discount-fields');

      if (discountBlock) discountBlock.classList.toggle('hidden', type !== 'discount');

    function buildCouponTemplateFromForm() {
      var type = document.getElementById('coupon-template-type').value;
      var name = document.getElementById('coupon-template-name').value.trim();
      var template = {
        templateId: 'tpl_' + Date.now(),
        name: name,
        type: type
      };
      if (!name) { alert('请填写优惠券名称'); return null; }
      if (type === 'discount') {
        template.discountRate = Number(document.getElementById('coupon-template-discount').value || 0);
        template.amount = 0;
        template.minSpend = 0;
        if (template.discountRate < 1 || template.discountRate > 9.9) { alert('折扣券请填写 1 到 9.9 之间的折扣'); return null; }
      } else {
        template.minSpend = Number(document.getElementById('coupon-template-min').value || 0);
        template.amount = Number(document.getElementById('coupon-template-amount').value || 0);
        template.discountRate = 0;
        if (!(template.minSpend > 0)) { alert('请填写满减门槛'); return null; }
        if (!(template.amount > 0)) { alert('请填写减免金额'); return null; }
      }
      return template;
    }

    function upsertCouponTemplate(template) {
      var templates = getCouponTemplates().filter(function (item) { return item.templateId !== template.templateId; });
      templates.unshift(template);
      return saveCouponTemplatesToServer(templates).then(function () {
        return template;
      });
    }

    function getFilteredCouponRecipients() {
      var keyword = (couponRecipientState.keyword || '').toLowerCase();
      var roleFilter = couponRecipientState.roleFilter || 'all';
      return getBuyerUsers().filter(function (u) {
        var roleText = getRoleLabelByMeta({ roles: u.roles }).toLowerCase();
        var usernameMatched = !keyword || u.username.toLowerCase().indexOf(keyword) > -1 || roleText.indexOf(keyword) > -1;
        var roleMatched = roleFilter === 'all'
          || (roleFilter === 'farmer' && u.roles.isFarmer)
          || (roleFilter === 'normal' && !u.roles.isFarmer && !u.roles.isAdmin);
        return usernameMatched && roleMatched;
      });
    }

    async function issueCouponTemplateToUsers(templateId, usernames) {
      var template = getCouponTemplates().find(function (item) { return item.templateId === templateId; });
      if (!template) { alert('未找到优惠券模板'); return false; }
      if (!usernames.length) { alert('请至少选择一个用户'); return false; }
      for (var index = 0; index < usernames.length; index++) {
        var username = usernames[index];
        var meta = getUserMeta(username);
        meta.coupons = meta.coupons || [];
        meta.coupons.push(buildCouponFromTemplate(template));
        await saveUserMetaAndWait(username, meta);
      }
      await fetchUsers();
      alert('优惠券已发放给 ' + usernames.length + ' 位用户');
      return true;
    }

    function confirmSelectedCouponRecipients() {
      var selectedUsers = Object.keys(couponRecipientState.selectedUsers).filter(function (username) { return couponRecipientState.selectedUsers[username]; });
      issueCouponTemplateToUsers(couponRecipientState.templateId, selectedUsers).then(function (ok) {
        if (ok) closeCouponUserPicker();
      }).catch(function (error) {
        alert(error.message || '优惠券发放失败');
      });
    }

    function issueCouponTemplateToAll(templateId) {
      var usernames = getBuyerUsers().map(function (u) { return u.username; });
      issueCouponTemplateToUsers(templateId, usernames).then(function (ok) {
        if (ok) renderAdminCoupon();
      }).catch(function (error) {
        alert(error.message || '优惠券发放失败');
      });
    }

    async function saveBanner(index) {
      var banners = getBanners().slice();
      var current = banners[index];
      if (!current) return;
      current.title = document.getElementById('banner-' + index + '-title').value.trim();
      current.sub = document.getElementById('banner-' + index + '-sub').value.trim();
      var linkData = readOperationalLinkFields('banner-' + index);
      current.linkType = linkData.linkType;
      current.productId = linkData.productId;

      return (meta.addresses || []).find(function (item) { return item.id === addressId; }) || meta.addresses[0] || null;

      var couponId = meta.selectedCouponId || '';
      var coupon = (meta.coupons || []).find(function (item) { return item.id === couponId && !item.used; }) || null;
      if (!coupon) return null;
      return calcCouponDiscount(coupon, subtotal) > 0 ? coupon : null;
    }

    function addToCart(id) {
      // 加购前先校验实时库存，避免买家端继续把缺货商品加进购物车。
      const p = getProds().find(x => x.id === id);
      if (!p) return;
      const i = cart.find(x => x.id === id);
      if (p.stock <= 0) { alert('当前库存不足'); return; }
      if (i) {
        if (i.qty >= p.stock) { alert('已达到可购买上限'); return; }
        i.qty++;
      }
      else cart.push({ id, name: p.name, price: p.price, unit: p.unit, img: p.img, qty: 1 });
      saveData();
      updateCartBadge();
      alert('已加入购物车');
    }

    function upd(id, d) {
      const i = cart.find(x => x.id === id);
      const p = getProds().find(x => x.id === id);
      if (i) {
        if (d > 0 && p && i.qty >= p.stock) { alert('库存不足'); return; }
        i.qty += d;
        if (i.qty <= 0) { cart = cart.filter(x => x.id !== id); }
        saveData(); updateCartBadge(); render();
      }
    }

    async function doCheckout() {
      if (!user) return;
      var meta = getUserMeta();
      var address = getSelectedAddress(meta);
      if (!address) { alert('请先配置收货地址'); go('address'); return; }
      var ps = getProds().map(cloneProduct);
      for (var idx = 0; idx < cart.length; idx++) {
        var item = cart[idx];
        var prod = ps.find(function (p) { return p.id === item.id; });
        if (!prod || prod.stock < item.qty) { alert(item.name + ' 库存不足，请修改购物车后再结算'); return; }
      }
      const t = cart.reduce((s, i) => s + i.price * i.qty, 0);
      var coupon = getSelectedCoupon(meta, t);
      var discount = calcCouponDiscount(coupon, t);
      const total = Math.max(0, t + 5 - discount);
      const order = { id: 'ORD' + Date.now(), items: cart.map(i => ({ ...i })), total, status: 'paid', time: Date.now(), address: address, coupon: coupon ? (coupon.name + '（' + getCouponBenefitText(coupon) + '）') : '' };
      orders.unshift(order);
      addPoints(t);
      // 订单成功后统一扣减库存、累计销量，并把已选优惠券标记成已使用。
      cart.forEach(function (item) {
        var prod = ps.find(function (p) { return p.id === item.id; });
        if (prod) {
          prod.stock = Math.max(0, prod.stock - item.qty);
          prod.sales = (prod.sales || 0) + item.qty;
        }
      });
      try {
        var changedProducts = ps.filter(function (prod) {
          return cart.some(function (item) { return item.id === prod.id; });
        });
        for (var pIndex = 0; pIndex < changedProducts.length; pIndex++) {
          await saveProductToServer(changedProducts[pIndex], { refresh: false });
        }
        await fetchProducts();
      } catch (error) {
        alert(error.message || '库存同步失败，请稍后重试');
        return;
      }
      if (coupon) {
        meta.coupons = meta.coupons.map(function (item) { return item.id === coupon.id ? Object.assign({}, item, { used: true }) : item; });
        meta.selectedCouponId = '';
        saveUserMeta(user, meta);
      }
      cart = [];
      saveData();
      updateCartBadge();
      alert('订单提交成功！');
      go('orders');
    }

    async function updateUserRole(uname, roleType) {
      try {
        var response = await fetch('/api/users/' + encodeURIComponent(uname) + '/role', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ roleType: roleType })
        });

        if (user === uname) {
          cart = saved.cart || [];

        alert(error.message || '权限保存失败');

    // 管理端需要看到所有用户的订单，而不是当前登录账号自己的 orders。

        var record = getUserRecord(u.username);
        (record && record.orders || []).forEach(function (o) { all.push(Object.assign({ owner: u.username }, o)); });
      });
      return all.sort(function (a, b) { return (b.time || 0) - (a.time || 0); });
    }

        return item.id === id ? Object.assign({}, item, { status: status }) : item;
      });
      try {
        await persistUserState(owner, record);

    var currentAdminTab = 'db';

      var h = '<div class="grid grid-cols-2 gap-3 mb-4">';

    async function toggleProd(id) {
      var ps = getProds();
      var p = ps.find(function (x) { return x.id === id; });
      if (!p) return;
      try {
        await saveProductToServer(Object.assign({}, cloneProduct(p), { off: !p.off }));
        renderAdminPd();
        renderAdminDb();
      } catch (error) {
        alert(error.message || '商品状态更新失败');
      }
    }
    function adjustStock(id, delta) {
      var ps = getProds();
      var p = ps.find(function (x) { return x.id === id; });
      if (!p) return;
      saveProductToServer(Object.assign({}, cloneProduct(p), { stock: Math.max(0, (p.stock || 0) + delta) }))
        .then(function () {
          if (!document.getElementById('admin-panel').classList.contains('hidden')) { renderAdminPd(); renderAdminDb(); }
          if (!document.getElementById('farmer-panel').classList.contains('hidden')) showFarmerPanel();
        })
        .catch(function (error) {
          alert(error.message || '库存更新失败');
        });
    }
    // 库存支持手填数字，适合快速盘点后一次性修正。
    function saveStockValue(id, val) {
      var ps = getProds();
      var p = ps.find(function (x) { return x.id === id; });
      if (!p) return;
      saveProductToServer(Object.assign({}, cloneProduct(p), { stock: Math.max(0, parseInt(val || '0')) }))
        .then(function () {
          if (!document.getElementById('admin-panel').classList.contains('hidden')) { renderAdminPd(); renderAdminDb(); }
          if (!document.getElementById('farmer-panel').classList.contains('hidden')) showFarmerPanel();
        })
        .catch(function (error) {
          alert(error.message || '库存更新失败');
        });
    }
    async function saveExistingProduct(id, source) {
      var ps = getProds();
      var p = ps.find(function (item) { return item.id === id; });
      if (!p) return;
      var prefix = (source === 'farmer' ? 'farmer-prod-' : 'admin-prod-') + id;
      var role = getUserRole();
      var draft = readProductForm(prefix, p);
      if (source === 'farmer') draft.farmer = role.farmerName || user;
      var error = validateProductPayload(draft);
      if (error) { alert(error); return; }
      try {
        var img = await getImageFromInputAsync(prefix + '-img', p.img || DEFAULT_PRODUCT_IMAGE, 'products');
        var payload = Object.assign({}, cloneProduct(p), {
          name: draft.name,
          price: draft.price,
          orig: draft.price,
          unit: draft.unit,
          cat: draft.cat,
          tags: draft.tags,
          stock: draft.stock,
          farmer: source === 'farmer' ? (role.farmerName || user) : (draft.farmer || '待设置'),
          farmerAccount: source === 'farmer' ? user : (p.farmerAccount || ''),
          farmerUserId: source === 'farmer' ? Number((getUserRecord(user) && getUserRecord(user).id) || 0) : Number(p.farmerUserId || 0),
          village: draft.village,
          harvest: draft.harvest,
          dispatchHours: draft.dispatchHours,
          img: img
        });
        await saveProductToServer(payload);
        if (source === 'farmer') farmerProductExpandState[id] = false;
        else adminProductExpandState[id] = false;
        if (source === 'farmer') showFarmerPanel();
        else { renderAdminPd(); renderAdminDb(); }
        alert('商品信息已保存');
      } catch (saveError) {
        alert(saveError.message || '商品保存失败');
      }
    }
    async function saveNewProduct() {
      var draft = readProductForm('new', createProductDraft({ farmer: '待设置' }));
      draft.farmer = draft.farmer || '待设置';
      var error = validateProductPayload(draft);
      if (error) { alert(error); return; }
      try {
        var img = await getImageFromInputAsync('new-img', DEFAULT_PRODUCT_IMAGE, 'products');
        await saveProductToServer(normalizeProduct({ name: draft.name, price: draft.price, orig: draft.price, unit: draft.unit, stock: draft.stock, cat: draft.cat, img: img, tags: draft.tags, sales: 0, farmer: draft.farmer, farmerAccount: '', farmerUserId: 0, village: draft.village, harvest: draft.harvest, dispatchHours: draft.dispatchHours, trace: [] }));
        renderAdminPd();
        renderAdminDb();
        alert('商品已添加');
      } catch (saveError) {
        alert(saveError.message || '商品添加失败');
      }
    }

      var currentUser = getUserRecord(user);
