      document.getElementById('admin-banner').innerHTML = h;
    }
    // [PRODUCT_SAVE] 商品新增/覆盖、库存修改、农户商品保存都按 ID 与必填规则走这里。
    function showAddProdForm() { document.getElementById('add-prod-form').classList.toggle('hidden'); }
    function hasProductFormContent(prefix, includeFarmer) {
      var nameInput = document.getElementById(prefix + '-name');
      if (!nameInput) return false;
      var farmerInput = includeFarmer ? document.getElementById(prefix + '-farmer') : null;
      var tagInput = document.getElementById(prefix + '-tags');
      var shippingInput = document.getElementById(prefix + '-shipping-address-id');
      return hasAnyFilledValue([
        nameInput.value,
        (document.getElementById(prefix + '-variants-json') || {}).value,
        (document.getElementById(prefix + '-harvest') || {}).value,
        (document.getElementById(prefix + '-dispatch-hours') || {}).value,
        (document.getElementById(prefix + '-village') || {}).value,
        shippingInput ? shippingInput.value : '',
        farmerInput ? farmerInput.value : '',
        getProductTags(tagInput ? (tagInput.value || '').split(',') : []),
        hasFileSelection(prefix + '-img') ? 'file' : ''
      ]);
    }
    function buildComparableProductPayload(payload) {
      var imageList = normalizeProductImageList(payload.images || [payload.img], payload.img || DEFAULT_PRODUCT_IMAGE);
      var coverImage = resolveProductCoverImage(imageList, payload.img || imageList[0]);
      return JSON.stringify({
        name: payload.name || '',
        price: Number(payload.price || 0),
        img: coverImage,
        images: imageList,
        unit: payload.unit || '',
        variants: normalizeProductVariants(payload).map(function (item) { return Object.assign({}, item); }),
        cat: payload.cat || '',
        tags: getProductTags(payload.tags || []),
        stock: Number(payload.stock || 0),
        farmer: payload.farmer || '',
        farmerAccount: payload.farmerAccount || '',
        farmerUserId: Number(payload.farmerUserId || 0),
        village: payload.village || '',
        shippingAddressId: payload.shippingAddressId || '',
        shippingAddressSnapshot: payload.shippingAddressSnapshot || {},
        harvest: payload.harvest || '',
        dispatchHours: Number(payload.dispatchHours || 0)
      });
    }
    function hasExistingProductDraftChanges(product, nextPayload, hasNewImage) {
      if (hasNewImage) return true;
      return buildComparableProductPayload(product) !== buildComparableProductPayload(nextPayload);
    }
    async function toggleProd(id) {
      var ps = getProds();
      var p = ps.find(function (x) { return x.id === id; });
      if (!p) return;
      try {
        await saveProductToServer(Object.assign({}, cloneProduct(p), { off: !p.off }));
        renderAdminPd();
        renderAdminDb();
      } catch (error) {
        alert(error.message || '商品状态更新失败');
      }
    }

    function formatProductDeleteImpactMessage(productName, impact) {
      var statusOrder = ['pending', 'paid', 'shipped', 'done', 'cancelled', 'refund_pending', 'refunded'];
      var counts = (impact && Array.isArray(impact.statusCounts) ? impact.statusCounts.slice() : []).sort(function (a, b) {
        var aIndex = statusOrder.indexOf(String(a && a.status || ''));
        var bIndex = statusOrder.indexOf(String(b && b.status || ''));
        if (aIndex < 0 && bIndex < 0) return String(a && a.status || '').localeCompare(String(b && b.status || ''));
        if (aIndex < 0) return 1;
        if (bIndex < 0) return -1;
        return aIndex - bIndex;
      });
      var lines = [
        '将删除商品：' + (productName || '未命名商品'),
        '已有 ' + Number(impact && impact.totalOrders || 0) + ' 个订单购买过该商品。'
      ];
      if (counts.length) {
        lines.push('订单状态分布：');
        counts.forEach(function (item) {
          lines.push(' - ' + getOrderStatusLabel(item.status || '') + '：' + Number(item.count || 0) + ' 单');
        });
      } else {
        lines.push('当前没有订单购买记录。');
      }
      lines.push('删除后仍可正常走退款流程；该商品库存将不再追踪。');
      lines.push('确认继续删除吗？');
      return lines.join('\n');
    }

    async function fetchProductDeleteImpact(productId) {
      var response = await fetch('/api/products/' + encodeURIComponent(String(productId || '')) + '/delete-impact');
      if (!response.ok) {
        var errorText = '获取商品删除影响失败';
        try {
          var payload = await response.json();
          if (payload && payload.message) errorText = payload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      return response.json();
    }

    async function confirmDeleteProduct(productId, source) {
      var id = Number(productId || 0);
      if (!(id > 0)) return;
      var product = getProds().find(function (item) { return Number(item.id || 0) === id; });
      if (!product) {
        alert('商品不存在或已删除');
        return;
      }
      try {
        var impact = await fetchProductDeleteImpact(id);
        var message = formatProductDeleteImpactMessage(product.name, impact);
        if (!confirm(message)) return;
        var response = await fetch('/api/products/' + encodeURIComponent(String(id)), {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            _audit: createAuditMeta({
              actionType: 'product_delete',
              operatorRole: source === 'farmer' ? 'farmer' : 'admin',
              note: source === 'farmer' ? '农户删除商品，保留历史订单快照' : '管理员删除商品，保留历史订单快照'
            })
          })
        });
        if (!response.ok) {
          var errorText = '商品删除失败';
          try {
            var errorPayload = await response.json();
            if (errorPayload && errorPayload.message) errorText = errorPayload.message;
          } catch (e) { }
          throw new Error(errorText);
        }
        await refreshPersistedEntities({ products: true, orders: true, refunds: true });
        if (source === 'farmer') showFarmerPanel();
        else {
          renderAdminPd();
          renderAdminDb();
        }
        alert('商品已删除');
      } catch (error) {
        alert(error.message || '商品删除失败');
      }
    }

    function adjustStock(id, delta) {
      var ps = getProds();
      var p = ps.find(function (x) { return x.id === id; });
      if (!p) return;
      saveProductToServer(Object.assign({}, cloneProduct(p), { stock: Math.max(0, (p.stock || 0) + delta) }))
        .then(function () {
          if (!document.getElementById('admin-panel').classList.contains('hidden')) { renderAdminPd(); renderAdminDb(); }
          if (!document.getElementById('farmer-panel').classList.contains('hidden')) showFarmerPanel();
        })
        .catch(function (error) {
          alert(error.message || '库存更新失败');
        });
    }
    // 库存支持手填数字，适合快速盘点后一次性修正。
    function saveStockValue(id, val) {
      var ps = getProds();
      var p = ps.find(function (x) { return x.id === id; });
      if (!p) return;
      saveProductToServer(Object.assign({}, cloneProduct(p), { stock: Math.max(0, parseInt(val || '0')) }))
        .then(function () {
          if (!document.getElementById('admin-panel').classList.contains('hidden')) { renderAdminPd(); renderAdminDb(); }
          if (!document.getElementById('farmer-panel').classList.contains('hidden')) showFarmerPanel();
        })
        .catch(function (error) {
          alert(error.message || '库存更新失败');
        });
    }
    async function saveExistingProduct(id, source, options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true, collapseAfterSave: true }, options || {});
      var ps = getProds();
      var p = ps.find(function (item) { return item.id === id; });
      if (!p) return false;
      var prefix = (source === 'farmer' ? 'farmer-prod-' : 'admin-prod-') + id;
      if (!document.getElementById(prefix + '-name')) return false;
      var role = getUserRole();
      var draft = readProductForm(prefix, p);
      if (source === 'farmer') draft.farmer = role.farmerName || user;
      var shippingSelection = resolveShippingAddressSelection(draft.shippingAddressId, p);
      draft.shippingAddressId = shippingSelection.shippingAddressId;
      var imageSelected = hasFileSelection(prefix + '-img');
      var error = validateProductPayload(draft);
      if (error) {
        if (config.alertInvalid) alert(error);
        return false;
      }
      try {
        var comparablePayload = Object.assign({}, cloneProduct(p), {
          name: draft.name,
          variants: normalizeProductVariants({ variants: draft.variants }),
          price: draft.price,
          orig: draft.price,
          unit: draft.unit,
          cat: draft.cat,
          tags: draft.tags,
          stock: draft.stock,
          farmer: source === 'farmer' ? (role.farmerName || user) : (draft.farmer || '待设置'),
          farmerAccount: source === 'farmer' ? user : (p.farmerAccount || ''),
          farmerUserId: source === 'farmer' ? Number((getUserRecord(user) && getUserRecord(user).id) || 0) : Number(p.farmerUserId || 0),
          village: draft.village,
          images: draft.images,
          img: draft.img,
          shippingAddressId: shippingSelection.shippingAddressId,
          shippingAddressSnapshot: shippingSelection.shippingAddressSnapshot,
          harvest: draft.harvest,
          dispatchHours: draft.dispatchHours
        });
        if (!hasExistingProductDraftChanges(p, comparablePayload, imageSelected)) return false;
        var imageState = await resolveProductImagesForSave(prefix, p);
        var payload = Object.assign({}, comparablePayload, {
          images: imageState.images,
          img: imageState.cover
        });
        await saveProductToServer(withProductAudit(payload, {
          actionType: 'manual_adjust',
          operatorRole: source === 'farmer' ? 'farmer' : 'admin',
          note: source === 'farmer' ? '农户编辑商品与库存信息' : '管理员编辑商品与库存信息'
        }));
        if (config.collapseAfterSave) {
          if (source === 'farmer') farmerProductExpandState[id] = false;
          else adminProductExpandState[id] = false;
        }
        if (config.rerenderAfterSave) {
          if (source === 'farmer') showFarmerPanel();
          else { renderAdminPd(); renderAdminDb(); }
        }
        if (config.alertSuccess) alert('商品信息已保存');
        return true;
      } catch (saveError) {
        if (config.alertInvalid) alert(saveError.message || '商品保存失败');
        return false;
      }
    }
    async function saveNewProduct(options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true }, options || {});
      if (!hasProductFormContent('new', true)) return false;
      var draft = readProductForm('new', createProductDraft({ farmer: '待设置' }));
      draft.farmer = draft.farmer || '待设置';
      var shippingSelection = resolveShippingAddressSelection(draft.shippingAddressId, null);
      draft.shippingAddressId = shippingSelection.shippingAddressId;
      var error = validateProductPayload(draft);
      if (error) {
        if (config.alertInvalid) alert(error);
        return false;
      }
      try {
        var imageState = await resolveProductImagesForSave('new', draft);
        await saveProductToServer(withProductAudit(normalizeProduct({ name: draft.name, variants: normalizeProductVariants({ variants: draft.variants }), price: draft.price, orig: draft.price, unit: draft.unit, stock: draft.stock, cat: draft.cat, images: imageState.images, img: imageState.cover, tags: draft.tags, sales: 0, farmer: draft.farmer, farmerAccount: '', farmerUserId: 0, village: draft.village, shippingAddressId: shippingSelection.shippingAddressId, shippingAddressSnapshot: shippingSelection.shippingAddressSnapshot, harvest: draft.harvest, dispatchHours: draft.dispatchHours, trace: [] }), {
          actionType: 'create',
          operatorRole: 'admin',
          note: '管理员新增商品并初始化库存'
        }));
        if (config.rerenderAfterSave) {
          renderAdminPd();
          renderAdminDb();
        }
        if (config.alertSuccess) alert('商品已添加');
        return true;
      } catch (saveError) {
        if (config.alertInvalid) alert(saveError.message || '商品添加失败');
        return false;
      }
    }

    // ===== 农户端 =====
    // [FARMER_PANEL] 农户端页签、商品维护、发货地址维护与返回逻辑从这里开始。
    function getFarmerProducts() {
      var currentUser = getUserRecord(user);
      var userId = Number(currentUser && currentUser.id || 0);
      return getProds().filter(function (p) { return Number(p.farmerUserId || 0) === userId || p.farmerAccount === user; });
    }
    async function saveFarmerProduct(options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: false, rerenderAfterSave: true }, options || {});
      if (!hasProductFormContent('farmer-new', false)) return false;
      var role = getUserRole();
      var draft = readProductForm('farmer-new', createProductDraft({ farmer: role.farmerName || user }));
      draft.farmer = role.farmerName || user;
      var shippingSelection = resolveShippingAddressSelection(draft.shippingAddressId, null);
      draft.shippingAddressId = shippingSelection.shippingAddressId;
      var error = validateProductPayload(draft);
      if (error) {
        if (config.alertInvalid) alert(error);
        return false;
      }
      try {
        var imageState = await resolveProductImagesForSave('farmer-new', draft);
        await saveProductToServer(withProductAudit(normalizeProduct({ name: draft.name, variants: normalizeProductVariants({ variants: draft.variants }), price: draft.price, orig: draft.price, unit: draft.unit, stock: draft.stock, cat: draft.cat, images: imageState.images, img: imageState.cover, tags: draft.tags, sales: 0, farmer: role.farmerName || user, farmerAccount: user, farmerUserId: Number((getUserRecord(user) && getUserRecord(user).id) || 0), village: draft.village, shippingAddressId: shippingSelection.shippingAddressId, shippingAddressSnapshot: shippingSelection.shippingAddressSnapshot, harvest: draft.harvest, dispatchHours: draft.dispatchHours, trace: [] }), {
          actionType: 'create',
          operatorRole: 'farmer',
          note: '农户新增商品并初始化库存'
        }));
        if (config.rerenderAfterSave) showFarmerPanel();
        if (config.alertSuccess) alert('商品已上架');
        return true;
      } catch (saveError) {
        if (config.alertInvalid) alert(saveError.message || '商品上架失败');
        return false;
      }
    }

    // [AUTOSAVE_DISPATCH] 所有“切页前自动保存”最终都会汇总到这里做分流。
    async function autoSaveExpandedProductEditors(source, expandState) {
      var saved = false;
      var keys = Object.keys(expandState || {}).filter(function (key) { return !!expandState[key]; });
      for (var index = 0; index < keys.length; index++) {
        var id = Number(keys[index]);
        if (!(id > 0)) continue;
        if (await saveExistingProduct(id, source, {
          alertInvalid: false,
          alertSuccess: false,
          rerenderAfterSave: false,
          collapseAfterSave: false
        })) saved = true;
      }
      return saved;
    }

    async function autoSaveCurrentContext() {
      var shouldRefreshUsers = false;
      var shouldRefreshProducts = false;
      var adminPanelVisible = !document.getElementById('admin-panel').classList.contains('hidden');
      var farmerPanelVisible = !document.getElementById('farmer-panel').classList.contains('hidden');

      if (adminPanelVisible) {
        if (currentAdminTab === 'ship') {
          shouldRefreshUsers = await persistShippingAddressDraft('admin', { silentIncomplete: true }) || shouldRefreshUsers;
        } else if (currentAdminTab === 'pd') {
          if (isElementVisible('add-prod-form')) {
            shouldRefreshProducts = await saveNewProduct({ alertInvalid: false, alertSuccess: false, rerenderAfterSave: false }) || shouldRefreshProducts;
          }
          shouldRefreshProducts = await autoSaveExpandedProductEditors('admin', adminProductExpandState) || shouldRefreshProducts;
        } else if (currentAdminTab === 'category') {
          await autoSaveCurrentCategoryEditor();
        } else if (currentAdminTab === 'coupon') {
          shouldRefreshProducts = false;
          await saveCouponTemplateFromForm({ alertInvalid: false, alertSuccess: false, rerenderAfterSave: false });
        } else if (currentAdminTab === 'banner') {
          for (var bannerIndex = 0; bannerIndex < getBanners().length; bannerIndex++) {
            await saveBanner(bannerIndex, { alertInvalid: false, alertSuccess: false, rerenderAfterSave: false });
          }
          for (var announcementIndex = 0; announcementIndex < getAnnouncements().length; announcementIndex++) {
            await saveAnnouncement(announcementIndex, { alertInvalid: false, alertSuccess: false, rerenderAfterSave: false });
          }
        }
      } else if (farmerPanelVisible) {
        if (currentFarmerTab === 'ship') {
          shouldRefreshUsers = await persistShippingAddressDraft('farmer', { silentIncomplete: true }) || shouldRefreshUsers;
        } else if (currentFarmerTab === 'product') {
          shouldRefreshProducts = await saveFarmerProduct({ alertInvalid: false, alertSuccess: false, rerenderAfterSave: false }) || shouldRefreshProducts;
          shouldRefreshProducts = await autoSaveExpandedProductEditors('farmer', farmerProductExpandState) || shouldRefreshProducts;
        }
      } else if (view === 'address') {
        shouldRefreshUsers = await persistReceiverAddressDraft({ silentIncomplete: true }) || shouldRefreshUsers;
      }

      if (shouldRefreshUsers || shouldRefreshProducts) {
        await refreshPersistedEntities({ users: shouldRefreshUsers, products: shouldRefreshProducts });
      }
    }

      if (currentFarmerTab === 'ship') {
        var meta = getUserMeta();

        h += '<div class="space-y-3">' + (list.length ? list.map(function (item) {
          return renderAddressItemCard('farmer', item);
        }).join('') : '<div class="surface-card p-4 text-sm text-gray-400">' + getAddressEditorUi('farmer').emptyText + '</div>') + '</div>';
        h += renderAddressCreateCard('farmer');

        h += '<div class="font-bold text-sm">我的商品</div>';
        h += myProds.length ? myProds.map(function (p) {
          return renderProductEditorCard(p, {
            prefix: 'farmer-prod-' + p.id,
            saveAction: 'saveExistingProduct(' + p.id + ',\'farmer\')',

            canEditFarmer: false,
            tone: 'farmer',
            source: 'farmer',
            expanded: !!farmerProductExpandState[p.id]
          });
        }).join('') : '<div class="bg-white rounded-xl p-4 text-sm text-gray-400">暂无商品，先上架一个吧</div>';
      }
      h += '</div>';
      document.getElementById('farmer-content').innerHTML = h;
      stabilizeViewportTop();
    }
