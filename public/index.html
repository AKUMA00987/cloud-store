<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日精月华</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --brand-deep: #3D8B5F;
      --brand-mid: #6BB77E;
      --brand-soft: #E8F5EC;
      --accent: #E8A44A;
      --accent-soft: #FCEBD8;
      --paper: #FAFAF5;
      --paper-deep: #F3EEE2;
      --surface: rgba(255, 253, 248, 0.96);
      --surface-soft: #F7F3EA;
      --surface-strong: #FFFFFF;
      --line: rgba(61, 139, 95, 0.14);
      --line-strong: rgba(61, 139, 95, 0.24);
      --text-strong: #2C3A2D;
      --text-muted: #6B7C6B;
      --text-faint: #97A397;
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 28px;
      --shadow-soft: 0 16px 38px rgba(61, 139, 95, 0.08);
      --shadow-card: 0 10px 24px rgba(61, 139, 95, 0.08);
      --shadow-raise: 0 20px 44px rgba(44, 58, 45, 0.14);
      --transition-fast: 160ms ease;
    }

    * {
      box-sizing: border-box;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif
    }

    html {
      background: var(--paper)
    }

    body {
      background:
        radial-gradient(circle at top, rgba(107, 183, 126, 0.18), transparent 34%),
        linear-gradient(180deg, #fdfcf7 0%, #f4efe4 100%);
      max-width: 428px;
      margin: 0 auto;
      min-height: 100vh;
      color: var(--text-strong)
    }

    #app {
      min-height: calc(100vh - 86px)
    }

    .btn:active {
      transform: scale(0.97)
    }

    .btn {
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), filter var(--transition-fast)
    }

    .btn:hover {
      filter: brightness(1.03)
    }

    .page-shell {
      padding: 18px 16px 104px
    }

    .page-shell.compact {
      padding-top: 14px
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 18px
    }

    .page-heading {
      min-width: 0;
      flex: 1
    }

    .page-title {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-strong)
    }

    .page-subtitle {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-muted)
    }

    .page-back {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(61, 139, 95, 0.12);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 20px rgba(44, 58, 45, 0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-strong)
    }

    .surface-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card)
    }

    .soft-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(247, 243, 234, 0.92));
      border: 1px solid rgba(61, 139, 95, 0.1);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card)
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(61, 139, 95, 0.96), rgba(107, 183, 126, 0.88));
      color: #fff;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow-raise)
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -12% -45% auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      filter: blur(2px)
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px
    }

    .section-title {
      font-size: 17px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--text-strong)
    }

    .section-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5
    }

    .subtle-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.03em
    }

    .chip-muted {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text-muted);
      font-size: 12px;
      border: 1px solid rgba(61, 139, 95, 0.08)
    }

    .search-launch {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 15px 16px;
      text-align: left;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(61, 139, 95, 0.1);
      border-radius: 22px;
      box-shadow: var(--shadow-card)
    }

    .product-tile {
      background: var(--surface);
      border: 1px solid rgba(61, 139, 95, 0.1);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast)
    }

    .product-tile:active {
      transform: translateY(1px)
    }

    .list-tile {
      background: var(--surface);
      border: 1px solid rgba(61, 139, 95, 0.1);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-card)
    }

    .cjk-keep {
      word-break: keep-all;
      overflow-wrap: break-word
    }

    .category-media-frame {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(135deg, rgba(243, 238, 226, 0.95), rgba(232, 245, 236, 0.75))
    }

    .category-media-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(243, 238, 226, 0.3));
      z-index: 1
    }

    .category-media-bg {
      position: absolute;
      inset: -8%;
      width: 116%;
      height: 116%;
      display: block;
      object-fit: cover;
      filter: blur(18px);
      opacity: 0.38;
      transform: scale(1.08);
      z-index: 0
    }

    .category-media-main {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      padding: 0
    }

    .product-gallery-scroll {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px
    }

    .product-gallery-scroll::-webkit-scrollbar {
      display: none
    }

    .product-gallery-slide {
      width: 100%;
      flex: 0 0 100%;
      scroll-snap-align: start
    }

    .choice-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(61, 139, 95, 0.12);
      color: var(--text-muted);
      font-size: 13px;
      transition: all var(--transition-fast)
    }

    .choice-pill.active {
      background: var(--brand-deep);
      color: #fff;
      border-color: var(--brand-deep);
      box-shadow: 0 10px 20px rgba(61, 139, 95, 0.18)
    }

    .choice-pill.warm.active {
      background: linear-gradient(135deg, #E8A44A, #D68928);
      border-color: #D68928
    }

    .auth-card {
      background: rgba(255, 253, 248, 0.98);
      border: 1px solid rgba(61, 139, 95, 0.12);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-raise)
    }

    input,
    select,
    textarea {
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast)
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(61, 139, 95, 0.35) !important;
      box-shadow: 0 0 0 4px rgba(61, 139, 95, 0.12)
    }

    .site-nav {
      backdrop-filter: blur(16px);
      background: rgba(250, 250, 245, 0.92);
      border-top: 1px solid rgba(61, 139, 95, 0.12);
      box-shadow: 0 -12px 30px rgba(44, 58, 45, 0.08)
    }

    .nav-action {
      min-width: 68px;
      border-radius: 18px;
      color: var(--text-faint);
      transition: all var(--transition-fast)
    }

    .nav-action.is-active {
      background: rgba(61, 139, 95, 0.12);
      color: var(--brand-deep)
    }

    .nav-action.is-active span {
      font-weight: 700
    }

    #admin-panel,
    #farmer-panel {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(107, 183, 126, 0.16), transparent 32%),
        linear-gradient(180deg, #fcfaf4 0%, #f2eee2 100%)
    }

    .workspace-topbar {
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(44, 58, 45, 0.14)
    }

    .workspace-side {
      background: rgba(255, 252, 245, 0.86);
      backdrop-filter: blur(8px)
    }

    .workspace-main {
      padding-bottom: 48px
    }

    .workspace-banner {
      background: linear-gradient(135deg, rgba(61, 139, 95, 0.94), rgba(107, 183, 126, 0.86));
      color: #fff;
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow-raise)
    }

    .workspace-banner.warm {
      background: linear-gradient(135deg, rgba(232, 164, 74, 0.96), rgba(224, 123, 57, 0.92))
    }

    #admin-panel .bg-white,
    #farmer-panel .bg-white {
      background: rgba(255, 253, 248, 0.98) !important;
      border: 1px solid rgba(61, 139, 95, 0.11);
      box-shadow: var(--shadow-card)
    }

    #admin-panel .bg-\[\#F9F7F3\],
    #farmer-panel .bg-\[\#F9F7F3\] {
      background: #f7f3ea !important
    }

    .level-lv1 {
      background: #E8F5EC;
      color: #2D9D4E
    }

    .level-lv2 {
      background: #E8F5EC;
      color: #1E7A3A
    }

    .level-lv3 {
      background: #FCEBD8;
      color: #C4602A
    }

    .level-lv4 {
      background: #2D9D4E;
      color: #fff
    }
  </style>
</head>

        };
      }
      var items = Array.isArray(source && source.items) ? source.items.map(normalizerFn) : [];
      var metaSource = source && source.meta ? source.meta : {};
      return {
        items: items,
        meta: createPagingMeta(
          metaSource.page != null ? metaSource.page : (fallbackMeta && fallbackMeta.page) || 1,
          metaSource.pageSize != null ? metaSource.pageSize : (fallbackMeta && fallbackMeta.pageSize) || Math.max(items.length, 1),
          metaSource.totalCount != null ? metaSource.totalCount : items.length

    function cacheDraftSnapshot(key, payload) {

    function invalidatePersistedCaches(options) {
      var config = options || {};
      if (config.users) usersState = {};
      if (config.products) productsLoaded = false;
      if (config.categories) categoriesState = [];
      if (config.orders) {
        allOrdersState = [];
        allOrdersLoaded = false;
      }
      if (config.refunds) {
        refundsState = [];
        refundsLoaded = false;
        refundsMetaState = createPagingMeta(1, refundsMetaState.pageSize || 8, 0);
      }
      if (config.ledgers) {
        paymentTransactionsState = [];

        paymentTransactionsMetaState = createPagingMeta(1, paymentTransactionsMetaState.pageSize || 10, 0);
        aftersalesState = [];
        aftersalesLoaded = false;

    async function refreshPersistedEntities(options) {
      var config = options || {};
      var tasks = [];
      var adminPanel = document.getElementById('admin-panel');
      var adminVisible = !!(adminPanel && !adminPanel.classList.contains('hidden'));
      invalidatePersistedCaches(config);
      if (config.users) tasks.push(fetchUsers());
      if (config.products) tasks.push(fetchProducts());
      if (config.categories) tasks.push(fetchCategories());
      if (config.orders) {
        if (user) tasks.push(fetchBuyerOrdersPage(1));
        if (adminVisible) tasks.push(fetchAdminOrdersPage(1));
      }
      if (config.refunds && adminVisible) tasks.push(fetchRefunds(Object.assign({}, adminRefundFilters)));
      if (config.ledgers) {
        tasks.push(fetchPaymentTransactions(Object.assign({}, adminLedgerState.paymentFilters)));
        tasks.push(fetchAftersales(Object.assign({}, adminLedgerState.aftersalesFilters)));
        tasks.push(fetchInventoryLogs(Object.assign({}, adminLedgerState.inventoryFilters)));
      }
      if (config.products && adminVisible) tasks.push(fetchAdminProductsPage(1));
      if (config.users && adminVisible && canManageAuth()) tasks.push(fetchAdminUsersPage(1));
      if ((config.products || config.users || config.orders || config.refunds) && adminVisible) tasks.push(fetchAdminLightStats());
      if (tasks.length) await Promise.all(tasks);
    }

    function upsertRecordById(list, item) {
      var target = item || {};
      var next = Array.isArray(list) ? list.slice() : [];
      if (!target.id) {
        next.push(target);
        return next;
      }
      var index = next.findIndex(function (entry) { return entry && entry.id === target.id; });
      if (index > -1) next[index] = target;
      else next.push(target);
      return next;
    }

    function hasAnyFilledValue(values) {
      return (values || []).some(function (value) {
        if (Array.isArray(value)) return value.length > 0;
        if (typeof value === 'number') return !isNaN(value);
        return !!String(value || '').trim();
      });
    }

    function hasFileSelection(inputId) {
      var input = document.getElementById(inputId);
      return !!(input && input.files && input.files[0]);
    }

    function isElementVisible(id) {
      var el = document.getElementById(id);
      return !!(el && !el.classList.contains('hidden'));
    }

    async function persistUserState(uname, override) {
      var name = uname || user;
      if (!name) return null;
      var base = normalizeUserRecord(Object.assign({}, getUserRecord(name) || { username: name }, override || {}));
      if (name === user) {
        base.cart = cart.map(function (item) { return Object.assign({}, item); });
        base.orders = orders.map(function (item) { return Object.assign({}, item); });
        base.member = Object.assign({ levelId: 'normal', points: 0, totalSpent: 0 }, member || {});
      }
      var response = await fetch('/api/users/' + encodeURIComponent(name) + '/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(base)
      });
      if (!response.ok) {
        var errorText = '用户数据保存失败';
        try {
          var errorPayload = await response.json();
          if (errorPayload && errorPayload.message) errorText = errorPayload.message;
        } catch (e) { }
        throw new Error(errorText);
      }
      var saved = normalizeUserRecord(await response.json());
      usersState[name] = saved;
      if (name === user) {
        cart = (saved.cart || []).map(normalizeCartStateItem);
        orders = (saved.orders || []).map(normalizeOrderSnapshot);
        member = Object.assign({ levelId: 'normal', points: 0, totalSpent: 0 }, saved.member || {});
      }
      return saved;
    }

    // 用户扩展资料统一走服务端 users 表缓存，角色、地址、优惠券都从同一份用户记录读取。
    function getUserMeta(uname) {
      var name = uname || user;
      if (!name) return { roles: { isFarmer: false, isAdmin: false }, addresses: [], shippingAddresses: [], coupons: [], createdAt: '' };
      var record = getUserRecord(name);
      if (!record) return { roles: { isFarmer: false, isAdmin: false }, addresses: [], shippingAddresses: [], coupons: [], createdAt: '' };
      return {
        roles: record.roles || { isFarmer: false, isAdmin: false },
        addresses: record.addresses || [],
        shippingAddresses: record.shippingAddresses || [],
        coupons: record.coupons || [],
        selectedAddressId: record.selectedAddressId || '',
        selectedCouponId: record.selectedCouponId || '',
        createdAt: record.createdAt || ''
      };
    }

    async function saveUserMetaAndWait(uname, meta) {
      var name = uname || user;
      var existing = normalizeUserRecord(Object.assign({}, getUserRecord(name) || { username: name }, meta || {}));
      usersState[name] = existing;
      return persistUserState(name, existing);

    var DEFAULT_PRODUCT_IMAGE = 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400';

      return Object.assign({
        name: '',
        cat: getDefaultCategoryId(),
        tags: [],
        variants: [createVariantDraft({
          id: buildVariantId('default', 0),
          units: [createUnitDraft({ id: buildUnitId('default', 0), label: '默认单位', isDefault: true })],
          isDefault: true
        })],
        price: 0,
        unit: '',
        stock: 0,
        harvest: new Date().toISOString().slice(0, 10),

      }, overrides || {});

    function serializeVariantsForField(variants) {
      return JSON.stringify(normalizeProductVariants({ variants: variants || [] }));
    }

    function parseVariantsFromField(value, fallbackProduct) {
      try {
        var parsed = JSON.parse(String(value || '[]'));
        if (Array.isArray(parsed) && parsed.length) return normalizeProductVariants({ variants: parsed });
      } catch (error) { }
      return normalizeProductVariants(fallbackProduct || {});
    }

    function getProductFormVariants(prefix, fallbackProduct) {
      var input = document.getElementById(prefix + '-variants-json');
      return parseVariantsFromField(input ? input.value : '[]', fallbackProduct || {});
    }

    function setProductFormVariants(prefix, variants) {
      var hidden = document.getElementById(prefix + '-variants-json');
      if (hidden) hidden.value = serializeVariantsForField(variants);
      var container = document.getElementById(prefix + '-variants-panel');
      if (container) container.innerHTML = renderVariantListPanel(prefix, { variants: variants });

      var normalized = normalizeProductVariants({ variants: variants || [] });

      var stockEl = document.getElementById(prefix + '-stock-summary');
      if (stockEl) stockEl.textContent = String(totalStock);
      var priceEl = document.getElementById(prefix + '-price-summary');
      var unitEl = document.getElementById(prefix + '-unit-summary');
      var defaultVariant = getDefaultVariant({ variants: normalized });
      var defaultUnit = defaultVariant ? getDefaultUnitForVariant(defaultVariant, { variants: normalized }) : null;
      if (priceEl) priceEl.textContent = fmt(defaultUnit && defaultUnit.price || defaultVariant && defaultVariant.price || 0);

          + '<div class="text-xs text-gray-500 mt-1">单位价格：' + getVariantPriceSummary(variant, { variants: variants }) + ' · 规格库存：' + Number(variant.stock || 0) + '</div>'

          + '<button type="button" onclick=\'confirmRemoveVariant(' + JSON.stringify(prefix) + ', ' + index + ')\' class="px-3 py-1.5 rounded-full bg-red-50 text-xs text-red-500">删除</button>'

    function openVariantEditor(prefix, index) {
      var variants = getProductFormVariants(prefix, {});

      root.innerHTML = '<div class="fixed inset-0 bg-black/30 z-[80] flex items-end sm:items-center justify-center p-4"><div class="bg-white rounded-2xl w-full max-w-xl p-4 max-h-[90vh] overflow-y-auto"><div class="flex items-center justify-between mb-3"><div><div class="font-bold">' + (index >= 0 ? '修改规格' : '新增规格') + '</div><div class="text-xs text-gray-500 mt-1">规格只保留分组语义，单位 list 同层维护单位价格和单位库存</div></div><button onclick="closeModal()" class="text-gray-400 text-sm">关闭</button></div><div class="space-y-3"><div><div class="text-sm font-medium text-gray-700 mb-1">规格名称</div><input id="variant-modal-label" value="' + escapeHtml(editing.label || '') + '" placeholder="如：礼盒装 / 大份" class="w-full p-2 border rounded-lg text-sm"></div><div class="rounded-xl bg-[#F9F7F3] p-3"><div class="flex items-center justify-between mb-2"><div><div class="text-sm font-medium text-gray-700">单位价格与单位库存 list</div><div class="text-xs text-gray-400 mt-1">一个规格下可维护多个单位，成交价格和库存都以单位为真相</div></div><button type="button" onclick="addVariantEditorUnitRow()" class="text-xs px-3 py-2 rounded-full bg-[#2D9D4E] text-white">新增单位</button></div><div id="variant-unit-list" class="space-y-2">' + units.map(function (unit, unitIndex) { return renderVariantEditorUnitRow(unit, unitIndex); }).join('') + '</div><div class="mt-3 rounded-xl bg-white border border-gray-200 p-3"><div class="text-xs text-gray-400">当前规格库存汇总</div><div id="variant-modal-stock-summary" class="font-bold text-base mt-1">' + units.reduce(function (sum, unit) { return sum + Number(unit.stock || 0); }, 0) + '</div></div></div></div><button onclick="saveVariantEditor()" class="w-full bg-[#2D9D4E] text-white py-2 rounded-lg text-sm">保存规格</button></div></div>';
    }

    function renderVariantEditorUnitRow(unit, index) {
      var payload = createUnitDraft(unit);
      return '<div class="rounded-xl bg-white border border-gray-200 p-3" data-unit-row="' + index + '">'
        + '<div class="grid grid-cols-3 gap-2">'
        + '<input type="hidden" data-unit-id value="' + escapeHtml(payload.id || '') + '">'
        + '<div><div class="text-xs text-gray-400 mb-1">单位名称</div><input data-unit-label value="' + escapeHtml(payload.label || '') + '" oninput="syncVariantEditorStockSummary()" placeholder="如：盒 / 箱 / 提" class="w-full p-2 border rounded-lg text-sm"></div>'
        + '<div><div class="text-xs text-gray-400 mb-1">单位价格</div><input data-unit-price value="' + Number(payload.price || 0) + '" oninput="syncVariantEditorStockSummary()" type="number" min="0" step="0.01" class="w-full p-2 border rounded-lg text-sm"></div>'
        + '<div><div class="text-xs text-gray-400 mb-1">单位库存</div><input data-unit-stock value="' + Number(payload.stock || 0) + '" oninput="syncVariantEditorStockSummary()" type="number" min="0" step="1" class="w-full p-2 border rounded-lg text-sm"></div>'
        + '</div>'
        + '<div class="flex items-center justify-between mt-2">'
        + '<label class="flex items-center gap-2 text-xs text-gray-500"><input data-unit-default type="radio" name="variant-unit-default" ' + (payload.isDefault ? 'checked' : '') + ' onchange="syncVariantEditorStockSummary()">默认购买单位</label>'
        + '<button type="button" onclick="removeVariantEditorUnitRow(' + index + ')" class="text-xs text-red-500">删除单位</button>'
        + '</div></div>';

    function readVariantEditorUnits() {
      var container = document.getElementById('variant-unit-list');
      if (!container) return [];
      return Array.prototype.slice.call(container.querySelectorAll('[data-unit-row]')).map(function (row, index) {
        var labelInput = row.querySelector('[data-unit-label]');
        var priceInput = row.querySelector('[data-unit-price]');
        var stockInput = row.querySelector('[data-unit-stock]');
        var idInput = row.querySelector('[data-unit-id]');
        var defaultInput = row.querySelector('[data-unit-default]');
        return createUnitDraft({
          id: (idInput && idInput.value ? idInput.value : '') || buildUnitId((labelInput && labelInput.value) || ('unit_' + index), index),
          label: labelInput ? String(labelInput.value || '').trim() : '',
          price: Math.max(0, Number(priceInput ? priceInput.value : 0)),
          stock: Math.max(0, Number(stockInput ? stockInput.value : 0)),
          sortOrder: index,
          isDefault: !!(defaultInput && defaultInput.checked)
        });
      });
    }

    function syncVariantEditorStockSummary() {
      var units = readVariantEditorUnits();
      if (!units.length) return;
      if (!units.some(function (unit) { return unit.isDefault; })) units[0].isDefault = true;
      var container = document.getElementById('variant-unit-list');
      var summary = document.getElementById('variant-modal-stock-summary');
      if (summary) summary.textContent = String(units.reduce(function (sum, unit) { return sum + Number(unit.stock || 0); }, 0));
      if (container) {
        Array.prototype.slice.call(container.querySelectorAll('[data-unit-row]')).forEach(function (row, index) {
          var radio = row.querySelector('[data-unit-default]');
          if (radio) radio.checked = !!units[index].isDefault;
        });
      }
    }

    function addVariantEditorUnitRow() {
      var container = document.getElementById('variant-unit-list');
      if (!container) return;
      var units = readVariantEditorUnits();
      units.push(createUnitDraft({
        id: buildUnitId('unit', units.length),
        label: '',
        price: 0,
        stock: 0,
        sortOrder: units.length,
        isDefault: units.length === 0
      }));
      container.innerHTML = units.map(function (unit, unitIndex) {
        return renderVariantEditorUnitRow(unit, unitIndex);
      }).join('');
      syncVariantEditorStockSummary();
    }

    function removeVariantEditorUnitRow(index) {
      var units = readVariantEditorUnits();
      if (units.length <= 1) { alert('至少保留 1 条单位，最后一条请改为修改'); return; }
      units.splice(index, 1);
      if (!units.some(function (unit) { return unit.isDefault; }) && units[0]) units[0].isDefault = true;
      var container = document.getElementById('variant-unit-list');
      if (container) {
        container.innerHTML = units.map(function (unit, unitIndex) {
          return renderVariantEditorUnitRow(unit, unitIndex);
        }).join('');
      }
      syncVariantEditorStockSummary();
    }

    function saveVariantEditor() {
      var prefix = variantEditorState.prefix;
      var variants = getProductFormVariants(prefix, {});
      var label = (document.getElementById('variant-modal-label') || {}).value || '';
      if (!String(label).trim()) { alert('请填写规格名称'); return; }
      var units = readVariantEditorUnits();
      if (!units.length) { alert('请至少维护 1 条单位'); return; }
      for (var unitIndex = 0; unitIndex < units.length; unitIndex++) {
        var unit = units[unitIndex];
        if (!String(unit.label || '').trim()) { alert('请填写单位名称'); return; }
        if (!(Number(unit.price || 0) > 0)) { alert('单位价格必须大于 0'); return; }
        if (isNaN(Number(unit.stock || 0)) || Number(unit.stock || 0) < 0) { alert('单位库存不能小于 0'); return; }
      }
      if (!units.some(function (unit) { return unit.isDefault; }) && units[0]) units[0].isDefault = true;
      var nextVariant = createVariantDraft({
        id: variantEditorState.mode === 'edit' && variants[variantEditorState.index] ? variants[variantEditorState.index].id : buildVariantId(label, variants.length),
        label: String(label).trim(),
        units: units.map(function (unit, unitIndex) {
          return createUnitDraft({
            id: unit.id || buildUnitId(unit.label, unitIndex),
            label: unit.label,
            price: Number(unit.price || 0),
            stock: unit.stock,
            sortOrder: unitIndex,
            isDefault: !!unit.isDefault
          });
        }),
        sortOrder: variantEditorState.mode === 'edit' ? Number(variants[variantEditorState.index].sortOrder || variantEditorState.index) : variants.length,
        isDefault: variantEditorState.mode === 'edit' ? !!(variants[variantEditorState.index] && variants[variantEditorState.index].isDefault) : variants.length === 0
      });
      if (variantEditorState.mode === 'edit' && variants[variantEditorState.index]) variants[variantEditorState.index] = nextVariant;
      else variants.push(nextVariant);
      setProductFormVariants(prefix, variants);
      closeModal();
    }

    function openVariantActionSheet(prefix, index) {
      openVariantEditor(prefix, index);
    }

    function confirmRemoveVariant(prefix, index) {
      var variants = getProductFormVariants(prefix, {});
      if (variants.length <= 1) { alert('至少保留 1 条规格，最后一条请改为修改'); return; }
      var variant = variants[index];
      if (!variant) return;
      if (!confirm('确定删除规格“' + variant.label + '”吗？')) return;
      variants.splice(index, 1);
      if (!variants.some(function (item) { return item.isDefault; }) && variants[0]) variants[0].isDefault = true;
      setProductFormVariants(prefix, variants);
      closeModal();
    }

    function getOperationalLinkLabel(linkType) {

    function renderOperationalLinkFields(prefix, item, kindLabel) {

    // 文件选择后先在本地预览，保存时再上传到服务端目录并回填访问地址。
    function previewImageUpload(inputId, previewId) {
      var input = document.getElementById(inputId);
      var preview = document.getElementById(previewId);
      if (!input || !preview || !input.files || !input.files[0] || typeof FileReader === 'undefined') return;
      if (preview.tagName !== 'IMG') {
        var nextPreview = document.createElement('img');
        nextPreview.id = preview.id;
        nextPreview.className = preview.className;
        nextPreview.alt = '预览图';
        preview.parentNode.replaceChild(nextPreview, preview);
        preview = nextPreview;
      }
      var reader = new FileReader();
      reader.onload = function (event) {
        preview.src = event.target.result || DEFAULT_PRODUCT_IMAGE;
      };
      reader.readAsDataURL(input.files[0]);
    }

    function readFileAsDataUrl(file) {
      return new Promise(function (resolve, reject) {
        if (!file || typeof FileReader === 'undefined') {
          reject(new Error('图片读取失败'));
          return;
        }
        var reader = new FileReader();
        reader.onload = function (event) {
          resolve((event && event.target && event.target.result) || '');
        };
        reader.onerror = function () {
          reject(new Error('图片读取失败'));
        };
        reader.readAsDataURL(file);
      });
    }

    function loadImageElement(src) {
      return new Promise(function (resolve, reject) {
        var img = new Image();
        img.onload = function () { resolve(img); };
        img.onerror = function () { reject(new Error('图片加载失败')); };
        img.src = src;
      });
    }

    // [CATEGORY_ICON_COMPRESS] 分类图标上传前统一压成固定尺寸 WEBP，减轻首页和分类页的高频加载体积。
    async function compressImageFileToDataUrl(file, options) {
      var config = Object.assign({ maxSize: 128, quality: 0.82, mimeType: 'image/webp' }, options || {});
      if (!file) throw new Error('未选择图片');
      if (typeof document === 'undefined' || typeof document.createElement !== 'function' || typeof HTMLCanvasElement === 'undefined') {
        return readFileAsDataUrl(file);
      }
      var src = await readFileAsDataUrl(file);
      var img = await loadImageElement(src);
      var canvas = document.createElement('canvas');
      canvas.width = config.maxSize;
      canvas.height = config.maxSize;
      var context = canvas.getContext('2d');
      if (!context) return src;
      context.clearRect(0, 0, canvas.width, canvas.height);
      var scale = Math.min(canvas.width / Math.max(1, img.width), canvas.height / Math.max(1, img.height));
      var drawWidth = Math.max(1, Math.round(img.width * scale));
      var drawHeight = Math.max(1, Math.round(img.height * scale));
      var offsetX = Math.round((canvas.width - drawWidth) / 2);
      var offsetY = Math.round((canvas.height - drawHeight) / 2);
      context.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
      return canvas.toDataURL(config.mimeType, config.quality);
    }

    async function cropImageFileToSquareDataUrl(file, options) {
      var config = Object.assign({ size: 960, quality: 0.88, mimeType: 'image/webp' }, options || {});
      if (!file) throw new Error('未选择图片');
      if (typeof document === 'undefined' || typeof document.createElement !== 'function' || typeof HTMLCanvasElement === 'undefined') {
        return readFileAsDataUrl(file);
      }
      var src = await readFileAsDataUrl(file);
      var img = await loadImageElement(src);
      var canvas = document.createElement('canvas');
      canvas.width = config.size;
      canvas.height = config.size;
      var context = canvas.getContext('2d');
      if (!context) return src;
      var minSide = Math.max(1, Math.min(img.width, img.height));
      var sx = Math.max(0, Math.round((img.width - minSide) / 2));
      var sy = Math.max(0, Math.round((img.height - minSide) / 2));
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.drawImage(img, sx, sy, minSide, minSide, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL(config.mimeType, config.quality);
    }

    function uploadImageDataUrl(dataUrl, fileName, folderName, done, fail) {
      fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dataUrl: dataUrl,
          fileName: fileName || 'image',
          folder: folderName || 'common'
        })
      }).then(function (response) {
        if (!response.ok) {
          return response.json().catch(function () {
            return { message: '图片上传失败' };
          }).then(function (payload) {
            throw new Error((payload && payload.message) || '图片上传失败');
          });
        }
        return response.json();
      }).then(function (payload) {
        done((payload && payload.url) || fallbackImage || DEFAULT_PRODUCT_IMAGE);
      }).catch(function (error) {
        if (fail) fail(error);
      });
    }

    function getProcessedImageFromInput(inputId, fallbackImage, folderName, processor, outputName, done, fail) {
      var input = document.getElementById(inputId);
      if (!input || !input.files || !input.files[0]) {
        done(fallbackImage || DEFAULT_PRODUCT_IMAGE);
        return;
      }
      var file = input.files[0];
      Promise.resolve(typeof processor === 'function' ? processor(file) : readFileAsDataUrl(file))
        .then(function (dataUrl) {
          uploadImageDataUrl(dataUrl || '', outputName || file.name || 'image', folderName, done, fail);
        })
        .catch(function (error) {
          if (fail) fail(error);
        });
    }

    function getImageFromInput(inputId, fallbackImage, folderName, done, fail) {
      getProcessedImageFromInput(inputId, fallbackImage, folderName, null, null, done, fail);
    }

    function parseProductImageFieldValue(value) {
      try {
        var parsed = JSON.parse(String(value || '[]'));
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function normalizeProductImageList(list, fallbackImage) {
      var fallback = String(fallbackImage || DEFAULT_PRODUCT_IMAGE).trim() || DEFAULT_PRODUCT_IMAGE;
      var normalized = (Array.isArray(list) ? list : [])
        .map(function (item) { return String(item || '').trim(); })
        .filter(Boolean)
        .filter(function (item, index, source) { return source.indexOf(item) === index; });
      if (!normalized.length) normalized = [fallback];
      return normalized;
    }

    function resolveProductCoverImage(images, preferredCover) {
      var normalized = normalizeProductImageList(images, preferredCover || DEFAULT_PRODUCT_IMAGE);
      var cover = String(preferredCover || '').trim();
      return cover && normalized.indexOf(cover) > -1 ? cover : normalized[0];
    }

    function moveCoverToFirst(images, cover) {
      var normalized = normalizeProductImageList(images, cover || DEFAULT_PRODUCT_IMAGE);
      var resolvedCover = resolveProductCoverImage(normalized, cover);
      if (normalized.indexOf(resolvedCover) <= 0) return normalized;
      return [resolvedCover].concat(normalized.filter(function (item) { return item !== resolvedCover; }));
    }

    function getProductImageStateFromForm(prefix, fallbackProduct) {
      var fallback = normalizeProduct(fallbackProduct || {});
      var imagesInput = document.getElementById(prefix + '-images-json');
      var coverInput = document.getElementById(prefix + '-cover-image');
      var images = normalizeProductImageList(
        parseProductImageFieldValue(imagesInput ? imagesInput.value : JSON.stringify(fallback.images || [])),
        fallback.img || DEFAULT_PRODUCT_IMAGE
      );
      var cover = resolveProductCoverImage(images, coverInput ? coverInput.value : (fallback.img || images[0]));
      return { images: images, cover: cover };
    }

    function renderProductImageListRows(prefix, images, cover) {
      return images.map(function (item, index) {
        var isCover = String(item) === String(cover || '');
        return '<div class="rounded-xl bg-white border border-gray-200 p-2 flex items-center gap-3">'
          + '<img src="' + item + '" class="w-14 h-14 rounded-lg object-cover shrink-0">'

          + '<div class="flex flex-col items-end gap-2 shrink-0">'
          + '<label class="text-xs ' + (isCover ? 'text-[#2D9D4E]' : 'text-gray-500') + '"><input type="radio" name="' + prefix + '-cover-radio" ' + (isCover ? 'checked ' : '') + 'onchange="setProductCoverImageByIndex(\'' + prefix + '\',' + index + ')"> 封面</label>'
          + '<button type="button" onclick="removeProductImageAt(\'' + prefix + '\',' + index + ')" class="text-xs text-red-500">删除</button>'
          + '</div></div>';

    function setProductImageStateForForm(prefix, images, cover) {

      var coverInput = document.getElementById(prefix + '-cover-image');
      var listRoot = document.getElementById(prefix + '-images-list');
      if (imagesInput) imagesInput.value = JSON.stringify(ordered);

        alert('至少保留 1 张商品图片');
        return;
      }
      var next = state.images.filter(function (_, itemIndex) { return itemIndex !== index; });
      setProductImageStateForForm(prefix, next, state.cover);

    function uploadImageDataUrlAsync(dataUrl, fileName, folderName) {
      return new Promise(function (resolve, reject) {

    async function appendProductImagesFromInput(prefix) {
      var input = document.getElementById(prefix + '-img');
      if (!input || !input.files || !input.files.length) {
        alert('请先选择图片');
        return;
      }
      var state = getProductImageStateFromForm(prefix, {});
      var next = state.images.slice();
      for (var index = 0; index < input.files.length; index++) {
        var file = input.files[index];
        var dataUrl = await cropImageFileToSquareDataUrl(file);
        var uploadedUrl = await uploadImageDataUrlAsync(dataUrl || '', file.name || 'product-image', 'products');
        if (next.indexOf(uploadedUrl) < 0) next.push(uploadedUrl);
      }
      input.value = '';
      setProductImageStateForForm(prefix, next, state.cover);
    }

      var next = state.images.slice();

        var dataUrl = await cropImageFileToSquareDataUrl(file);

        if (next.indexOf(uploadedUrl) < 0) next.push(uploadedUrl);

        + '<div class="text-[11px] text-gray-400 mt-2">左侧缩略图用于选封面；封面会用于商品卡片和订单商品快照。</div>'

    // 商品录入和编辑统一校验，避免后台字段和前台展示继续出现不一致。
    function validateProductPayload(payload) {
      if (!payload.name) return '请填写商品名称';
      if (!payload.cat) return '请选择商品分类';
      if (!Array.isArray(payload.images) || !payload.images.length) return '请至少上传 1 张商品图片';
      if (!Array.isArray(payload.variants) || !payload.variants.length) return '请至少维护 1 条规格';
      for (var index = 0; index < payload.variants.length; index++) {
        var variant = payload.variants[index] || {};
        if (!String(variant.label || '').trim()) return '请填写规格名称';
        if (!Array.isArray(variant.units) || !variant.units.length) return '每个规格至少维护 1 条单位';
        for (var unitIndex = 0; unitIndex < variant.units.length; unitIndex++) {
          var unit = variant.units[unitIndex] || {};
          if (!String(unit.label || '').trim()) return '请填写单位名称';
          if (!(Number(unit.price || 0) > 0)) return '单位价格必须大于 0';
          if (isNaN(Number(unit.stock || 0)) || Number(unit.stock || 0) < 0) return '单位库存不能小于 0';
        }
      }
      if (!payload.harvest) return '请填写采摘日期';
      if (isNaN(payload.dispatchHours) || payload.dispatchHours <= 0) return '发货时效必须大于 0 小时';
      if (!payload.shippingAddressId) return '请为商品选择发货地址';
      if ((payload.tags || []).length > 2) return '每个商品最多展示 2 个标签';
      return '';
    }

    function hasCouponTemplateFormContent() {
      var nameInput = document.getElementById('coupon-template-name');
      if (!nameInput) return false;
      return hasAnyFilledValue([
        nameInput.value,
        (document.getElementById('coupon-template-min') || {}).value,
        (document.getElementById('coupon-template-amount') || {}).value,
        (document.getElementById('coupon-template-discount') || {}).value
      ]);
    }

    function buildCouponTemplateFromForm(options) {
      var config = Object.assign({ alertInvalid: true }, options || {});
      var type = document.getElementById('coupon-template-type').value;
      var name = document.getElementById('coupon-template-name').value.trim();
      var templateIdInput = document.getElementById('coupon-template-id');
      var template = {
        templateId: templateIdInput && templateIdInput.value ? templateIdInput.value : 'tpl_' + Date.now(),
        name: name,
        type: type
      };
      if (!name) {
        if (config.alertInvalid) alert('请填写优惠券名称');
        return null;
      }
      if (type === 'discount') {
        template.discountRate = Number(document.getElementById('coupon-template-discount').value || 0);
        template.amount = 0;
        template.minSpend = 0;
        if (template.discountRate < 1 || template.discountRate > 9.9) {
          if (config.alertInvalid) alert('折扣券请填写 1 到 9.9 之间的折扣');
          return null;
        }
      } else {
        template.minSpend = Number(document.getElementById('coupon-template-min').value || 0);
        template.amount = Number(document.getElementById('coupon-template-amount').value || 0);
        template.discountRate = 0;
        if (!(template.minSpend > 0)) {
          if (config.alertInvalid) alert('请填写满减门槛');
          return null;
        }
        if (!(template.amount > 0)) {
          if (config.alertInvalid) alert('请填写减免金额');
          return null;
        }
      }
      return template;
    }

    function upsertCouponTemplate(template) {
      var templates = getCouponTemplates().filter(function (item) { return item.templateId !== template.templateId; });
      templates.unshift(template);
      return saveCouponTemplatesToServer(templates).then(function () {
        return template;
      });
    }

    function saveCouponTemplateFromForm(options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true }, options || {});
      if (!hasCouponTemplateFormContent()) return Promise.resolve(false);
      var template = buildCouponTemplateFromForm({ alertInvalid: config.alertInvalid });
      if (!template) return Promise.resolve(false);
      return upsertCouponTemplate(template).then(function () {
        if (config.rerenderAfterSave) renderAdminCoupon();
        if (config.alertSuccess) alert('优惠券模板已保存');
        return true;
      }).catch(function (error) {
        if (config.alertInvalid) alert(error.message || '优惠券模板保存失败');
        return false;
      });
    }

    function openCouponPickerFromForm() {
      var template = buildCouponTemplateFromForm({ alertInvalid: true });
      if (!template) return;
      upsertCouponTemplate(template).then(function () {
        openCouponUserPicker(template.templateId);
      }).catch(function (error) {
        alert(error.message || '优惠券模板保存失败');
      });
    }

    function issueCouponToAllFromForm() {
      var template = buildCouponTemplateFromForm({ alertInvalid: true });
      if (!template) return;
      upsertCouponTemplate(template).then(function () {
        issueCouponTemplateToAll(template.templateId);
      }).catch(function (error) {
        alert(error.message || '优惠券模板保存失败');
      });
    }

      renderAdminCoupon();

      couponRecipientState.roleFilter = value;
      renderAdminCoupon();

      couponRecipientState.selectedUsers[username] = !couponRecipientState.selectedUsers[username];
      renderAdminCoupon();
    }

    function getFilteredCouponRecipients() {
      var keyword = (couponRecipientState.keyword || '').toLowerCase();
      var roleFilter = couponRecipientState.roleFilter || 'all';
      return getBuyerUsers().filter(function (u) {
        var roleText = getRoleLabelByMeta({ roles: u.roles }).toLowerCase();
        var usernameMatched = !keyword || u.username.toLowerCase().indexOf(keyword) > -1 || roleText.indexOf(keyword) > -1;
        var roleMatched = roleFilter === 'all'
          || (roleFilter === 'farmer' && u.roles.isFarmer)
          || (roleFilter === 'normal' && !u.roles.isFarmer && !u.roles.isAdmin);
        return usernameMatched && roleMatched;
      });
    }

    async function issueCouponTemplateToUsers(templateId, usernames) {
      var template = getCouponTemplates().find(function (item) { return item.templateId === templateId; });
      if (!template) { alert('未找到优惠券模板'); return false; }
      if (!usernames.length) { alert('请至少选择一个用户'); return false; }
      for (var index = 0; index < usernames.length; index++) {
        var username = usernames[index];
        var meta = getUserMeta(username);
        meta.coupons = meta.coupons || [];
        meta.coupons.push(buildCouponFromTemplate(template));
        await saveUserMetaAndWait(username, meta);
      }
      await fetchUsers();
      alert('优惠券已发放给 ' + usernames.length + ' 位用户');
      return true;
    }

    function confirmSelectedCouponRecipients() {
      var selectedUsers = Object.keys(couponRecipientState.selectedUsers).filter(function (username) { return couponRecipientState.selectedUsers[username]; });
      issueCouponTemplateToUsers(couponRecipientState.templateId, selectedUsers).then(function (ok) {
        if (ok) closeCouponUserPicker();
      }).catch(function (error) {
        alert(error.message || '优惠券发放失败');
      });
    }

    function issueCouponTemplateToAll(templateId) {
      var usernames = getBuyerUsers().map(function (u) { return u.username; });
      issueCouponTemplateToUsers(templateId, usernames).then(function (ok) {
        if (ok) renderAdminCoupon();
      }).catch(function (error) {
        alert(error.message || '优惠券发放失败');
      });
    }

    // [CONTENT_EDITOR] Banner、公告、优惠券模板这类后台运营内容在这里做增删改和静默保存。
    function buildComparableBanner(item) {
      return JSON.stringify({
        title: item && item.title ? item.title : '',
        sub: item && item.sub ? item.sub : '',
        linkType: item && item.linkType ? item.linkType : 'none',
        productId: Number(item && item.productId || 0),
        externalUrl: item && item.externalUrl ? item.externalUrl : ''
      });
    }

    async function saveBanner(index, options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true }, options || {});
      var banners = getBanners().slice();
      var current = banners[index];
      if (!current || !document.getElementById('banner-' + index + '-title')) return false;
      var next = Object.assign({}, current);
      next.title = document.getElementById('banner-' + index + '-title').value.trim();
      next.sub = document.getElementById('banner-' + index + '-sub').value.trim();
      var linkData = readOperationalLinkFields('banner-' + index);
      next.linkType = linkData.linkType;
      next.productId = linkData.productId;
      next.externalUrl = linkData.externalUrl;
      if (!next.title || !next.sub) {
        if (config.alertInvalid) alert('请填写 Banner 标题和副标题');
        return false;
      }
      var linkError = validateOperationalLink(linkData, 'Banner');
      if (linkError) {
        if (config.alertInvalid) alert(linkError);
        return false;
      }
      var hasNewImage = hasFileSelection('banner-' + index + '-img');
      if (!hasNewImage && buildComparableBanner(next) === buildComparableBanner(current)) return false;
      try {
        next.img = await getImageFromInputAsync('banner-' + index + '-img', current.img, 'banners');
        banners[index] = next;
        await saveBannersToServer(banners);
        if (config.rerenderAfterSave) {
          renderAdminBanner();
          if (view === 'home') render();
        }
        if (config.alertSuccess) alert('Banner 已更新');
        return true;
      } catch (error) {
        if (config.alertInvalid) alert(error.message || 'Banner 保存失败');
        return false;
      }
    }

    async function addBanner() {
      var banners = getBanners().slice();
      banners.push(normalizeBanner({
        title: '新活动 Banner',
        sub: '请填写副标题',
        img: DEFAULT_PRODUCT_IMAGE
      }, banners.length));
      try {
        await saveBannersToServer(banners);

    async function saveAnnouncement(index, options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true }, options || {});
      var list = getAnnouncements().slice();
      var current = list[index];
      if (!current || !document.getElementById('announcement-' + index + '-text')) return false;
      var next = Object.assign({}, current);
      next.text = document.getElementById('announcement-' + index + '-text').value.trim();
      next.active = !!document.getElementById('announcement-' + index + '-active').checked;
      var linkData = readOperationalLinkFields('announcement-' + index);
      next.linkType = linkData.linkType;
      next.productId = linkData.productId;
      next.externalUrl = linkData.externalUrl;
      if (!next.text) {
        if (config.alertInvalid) alert('请填写公告内容');
        return false;
      }
      var linkError = validateOperationalLink(linkData, '公告');
      if (linkError) {
        if (config.alertInvalid) alert(linkError);
        return false;
      }
      if (buildComparableAnnouncement(next) === buildComparableAnnouncement(current)) return false;
      try {
        list[index] = next;
        await saveAnnouncementsToServer(list);
        if (config.rerenderAfterSave) {
          renderAdminBanner();
          if (view === 'home') render();
        }
        if (config.alertSuccess) alert('公告已更新');
        return true;
      } catch (error) {
        if (config.alertInvalid) alert(error.message || '公告保存失败');
        return false;
      }
    }

    function getSelectedAddress(meta) {
      var addressId = meta.selectedAddressId || '';
      return (meta.addresses || []).find(function (item) { return item.id === addressId; }) || meta.addresses[0] || null;
    }

    function getSelectedCoupon(meta, subtotal) {
      var couponId = meta.selectedCouponId || '';
      var coupon = (meta.coupons || []).find(function (item) { return item.id === couponId && !item.used; }) || null;
      if (!coupon) return null;
      return calcCouponDiscount(coupon, subtotal) > 0 ? coupon : null;
    }

    function buildCheckoutSummary(meta) {
      var subtotal = cart.reduce(function (sum, item) { return sum + item.price * item.qty; }, 0);
      var deliveryFee = cart.length ? 5 : 0;
      var coupon = getSelectedCoupon(meta, subtotal);
      var discount = calcCouponDiscount(coupon, subtotal);
      return {
        subtotal: subtotal,
        deliveryFee: deliveryFee,
        coupon: coupon,
        discount: discount,
        total: Math.max(0, subtotal + deliveryFee - discount)
      };
    }

    function buildCheckoutItemsSnapshot() {
      return cart.map(function (item) {
        var product = getProds().find(function (p) { return p.id === item.id; });
        var variant = product ? resolveVariantForCartItem(product, item) : null;
        var unit = product ? resolveUnitForCartItem(product, item, variant) : null;
        return Object.assign({}, normalizeCartStateItem(item), {
          variantId: variant && variant.id ? String(variant.id) : String(item.variantId || ''),
          variantLabel: variant && variant.label ? String(variant.label) : String(item.variantLabel || item.unitLabel || item.unit || ''),
          unitId: unit && unit.id ? String(unit.id) : String(item.unitId || ''),
          unitLabel: unit && unit.label ? String(unit.label) : String(item.unitLabel || item.unit || item.variantLabel || ''),
          unit: unit && unit.label ? String(unit.label) : String(item.unit || item.unitLabel || item.variantLabel || ''),
          price: Number(unit && unit.price != null ? unit.price : item.price || 0),
          shippingAddressId: product && product.shippingAddressId ? product.shippingAddressId : '',
          shippingAddressSnapshot: product && product.shippingAddressSnapshot ? Object.assign({}, product.shippingAddressSnapshot) : {}
        });
      });
    }

    function validateCheckoutBeforePayment() {
      if (!user) return '请先登录';
      if (!cart.length) return '购物车为空';
      var meta = getUserMeta();
      var address = getSelectedAddress(meta);
      if (!address) return '请先选择收货地址';
      for (var index = 0; index < cart.length; index++) {
        var item = cart[index];
        var product = getProds().find(function (p) { return p.id === item.id; });
        if (!product) return item.name + ' 已不存在，请重新确认购物车';
        var variant = resolveVariantForCartItem(product, item);
        if (!variant) return item.name + ' 规格不存在，请重新确认购物车';
        var unit = resolveUnitForCartItem(product, item, variant);
        if (!unit) return item.name + ' 单位不存在，请重新确认购物车';
        if (unit.stock < item.qty) return item.name + '（' + variant.label + ' / ' + unit.label + '）库存不足，请修改购物车后再结算';
        if (!product.shippingAddressId || !product.shippingAddressSnapshot || !product.shippingAddressSnapshot.full) return item.name + ' 暂未配置发货地址，暂时无法下单';
      }
      return '';
    }

    function getSelectedVariantForProduct(product, options) {
      var config = Object.assign({ autoSingle: false }, options || {});

          var defaultUnit = getDefaultUnitForVariant(defaultVariant, normalizedProduct);

          };
        }
        return defaultVariant;
      }
      return null;
    }

    function getSelectedUnitForProduct(product, options) {
      var config = Object.assign({ autoSingle: false }, options || {});
      var normalizedProduct = normalizeProduct(product);
      var selectedVariant = getSelectedVariantForProduct(normalizedProduct, options);
      if (!selectedVariant) return null;
      var units = normalizeVariantUnits(selectedVariant, Number(selectedVariant.sortOrder || 0), normalizedProduct);
      var selectedEntry = getSelectedVariantStateEntry(normalizedProduct.id);
      var selectedUnit = getVariantUnitById(selectedVariant, selectedEntry.unitId, normalizedProduct);
      if (selectedUnit && selectedEntry.unitId) return selectedUnit;

        selectedVariantState[normalizedProduct.id] = {
          variantId: selectedVariant.id,
          unitId: defaultUnit && defaultUnit.id ? defaultUnit.id : ''
        };
        return defaultUnit;
      }
      return null;

    // === ACTIONS ===
    async function doLogin() {
      const u = $('lu').value.trim(), p = $('lp').value;
      if (!u || !p) { alert('请填写用户名和密码'); return; }
      try {
        var response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        if (!response.ok) {
          var errorPayload = await response.json().catch(function () { return { message: '登录失败' }; });
          alert((errorPayload && errorPayload.message) || '登录失败');
          return;
        }
        var loginUser = await fetchCurrentUserSession();
        if (!loginUser) throw new Error('登录状态未建立');
        await fetchUsers();
        await fetchBuyerOrdersPage(1);
        go('home');
      } catch (error) {
        alert(error.message || '登录失败');
      }
    }

    async function doRegister() {
      const u = $('ru').value.trim(), p = $('rp').value;
      if (!u || !p) { alert('请填写用户名和密码'); return; }
      if (u.length < 3) { alert('用户名至少3个字符'); return; }
      try {
        var response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        if (!response.ok) {
          var errorPayload = await response.json().catch(function () { return { message: '注册失败' }; });
          alert((errorPayload && errorPayload.message) || '注册失败');
          return;
        }
        var createdUser = await fetchCurrentUserSession();
        if (!createdUser) throw new Error('注册后登录状态未建立');
        await fetchUsers();
        await fetchBuyerOrdersPage(1);
        alert('注册成功！已发放新人优惠券');
        go('home');
      } catch (error) {
        alert(error.message || '注册失败');
      }
    }

    // [ADDRESS_AUTOSAVE] 收货地址与发货地址的草稿识别、ID 覆盖和静默自动保存都在这里。
    function collectSimpleAddressDraft(config) {
      var nameInput = document.getElementById(config.nameId);
      var phoneInput = document.getElementById(config.phoneId);
      var fullInput = document.getElementById(config.fullId);
      if (!nameInput || !phoneInput || !fullInput) return null;
      return {
        id: config.recordId || '',
        name: nameInput.value.trim(),
        phone: phoneInput.value.trim(),
        full: fullInput.value.trim()
      };
    }

    async function persistReceiverAddressDraft(options) {
      var config = Object.assign({ silentIncomplete: false }, options || {});
      if (!user) return false;
      var editor = getAddressEditorInputConfig('receiver');
      if (!editor.mode) {
        clearDraftSnapshot('receiver-address');
        return false;
      }
      var payload = collectSimpleAddressDraft(editor);
      if (!payload) return false;
      if (editor.mode === 'new' && !hasAnyFilledValue([payload.name, payload.phone, payload.full])) {
        if (!config.silentIncomplete) alert('请先填写完整收货地址');
        clearDraftSnapshot('receiver-address');
        return false;
      }
      var error = validateAddressPayload(payload);
      if (error) {
        cacheDraftSnapshot('receiver-address', payload);
        if (!config.silentIncomplete) alert(error);
        return false;
      }
      var item = { id: payload.id || 'addr_' + Date.now(), name: payload.name, phone: payload.phone, full: payload.full };
      var meta = getUserMeta();
      meta.addresses = upsertRecordById(meta.addresses || [], item);
      if (!meta.selectedAddressId) meta.selectedAddressId = item.id;
      cacheDraftSnapshot('receiver-address', item);
      await saveUserMetaAndWait(user, meta);
      setAddressEditorState('receiver', '', '');
      clearDraftSnapshot('receiver-address');
      return true;
    }

    async function persistShippingAddressDraft(source, options) {
      var config = Object.assign({ silentIncomplete: false }, options || {});
      if (!user) return;
      var scope = source === 'farmer' ? 'farmer' : 'admin';
      var draftKey = scope + '-ship-address';
      var editor = getAddressEditorInputConfig(scope);
      if (!editor.mode) {
        clearDraftSnapshot(draftKey);
        return false;
      }
      var payload = collectSimpleAddressDraft(editor);
      if (!payload) return false;
      if (editor.mode === 'new' && !hasAnyFilledValue([payload.name, payload.phone, payload.full])) {
        if (!config.silentIncomplete) alert('请先填写完整发货地址');
        clearDraftSnapshot(draftKey);
        return false;
      }
      var error = validateShippingAddressPayload(payload);
      if (error) {
        cacheDraftSnapshot(draftKey, payload);
        if (!config.silentIncomplete) alert(error);
        return false;
      }
      var meta = getUserMeta();
      var item = { id: payload.id || 'ship_' + Date.now(), name: payload.name, phone: payload.phone, full: payload.full };
      meta.shippingAddresses = upsertRecordById(meta.shippingAddresses || [], item);
      cacheDraftSnapshot(draftKey, item);
      await saveUserMetaAndWait(user, meta);
      setAddressEditorState(scope, '', '');
      clearDraftSnapshot(draftKey);
      return true;
    }

    // [CART_AND_PAYMENT] 购物车修改、模拟支付、库存扣减和订单完成后的状态推进从这里开始查。
    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
      } catch (e) { }
      applyCurrentUserRecord(null);
      currentCheckoutOrder = null;
      currentFarmerTab = 'product';
      closeModal();
      updateCartBadge();
      go('home');
    }

    function addToCart(id, options) {
      var config = Object.assign({ alertSuccess: true }, options || {});
      // 加购前先校验实时库存，避免买家端继续把缺货商品加进购物车。
      const p = getProds().find(x => x.id === id);
      if (!p) return false;
      var selectedVariant = getSelectedVariantForProduct(p, { autoSingle: normalizeProductVariants(p).length === 1 });
      var selectedUnit = getSelectedUnitForProduct(p, { autoSingle: selectedVariant ? normalizeVariantUnits(selectedVariant, Number(selectedVariant.sortOrder || 0), p).length === 1 : false });
      if (!selectedVariant) { alert('请先选择规格'); return false; }
      if (!selectedUnit) { alert('请先选择单位'); return false; }
      const i = findCartItem(id, selectedVariant.id, selectedUnit.id);
      if (selectedUnit.stock <= 0) { alert('当前单位库存不足'); return false; }
      if (i) {
        if (i.qty >= selectedUnit.stock) { alert('已达到当前单位可购买上限'); return false; }
        i.qty++;
      }
      else cart.push(normalizeCartStateItem({
        id: p.id,
        productId: p.id,
        name: p.name,
        variantId: selectedVariant.id,
        variantLabel: selectedVariant.label,
        unitId: selectedUnit.id,
        unitLabel: selectedUnit.label,
        price: Number(selectedUnit.price || 0),
        unit: selectedUnit.label,
        img: p.img,
        qty: 1
      }));
      saveData();
      updateCartBadge();
      if (config.alertSuccess) alert('已加入购物车');
      return true;
    }

    function buyNow(id) {
      if (addToCart(id, { alertSuccess: false })) go('cart');
    }

    function upd(id, d, variantId, unitId) {
      const i = findCartItem(id, variantId, unitId);
      const p = getProds().find(x => x.id === id);
      if (i) {
        var variant = p ? resolveVariantForCartItem(p, i) : null;
        var unit = p ? resolveUnitForCartItem(p, i, variant) : null;
        if (d > 0 && unit && i.qty >= unit.stock) { alert('库存不足'); return; }
        i.qty += d;
        if (i.qty <= 0) { cart = cart.filter(function (item) { return item.key !== i.key; }); }
        saveData(); updateCartBadge(); render();
      }
    }

    async function completeMockPayment() {
      if (!user || !currentCheckoutOrder) return;
      if (currentCheckoutOrder.status !== 'pending' || currentCheckoutOrder.inventoryReleased || isPendingOrderExpired(currentCheckoutOrder)) {
        alert('订单已超时取消，不能继续支付');
        return;
      }
      var meta = getUserMeta();
      try {
        var paidOrder = await payPendingOrderOnServer(user, currentCheckoutOrder.id);
        orders = upsertRecordById(orders.map(normalizeOrderSnapshot), paidOrder).map(normalizeOrderSnapshot).sort(function (a, b) {
          return Number(b.time || 0) - Number(a.time || 0);
        });
        addPoints(paidOrder.subtotal || currentCheckoutOrder.subtotal || 0);
        if (currentCheckoutOrder.couponId) {
          meta.coupons = (meta.coupons || []).map(function (item) {
            return item.id === currentCheckoutOrder.couponId ? Object.assign({}, item, { used: true }) : item;
          });
          meta.selectedCouponId = '';
        }
        cart = [];
        updateCartBadge();
        await persistUserState(user, Object.assign({}, meta, {
          cart: [],
          orders: orders,
          member: member
        }));
        await refreshPersistedEntities({ users: true, orders: true, products: true });
        currentCheckoutOrder = null;
        alert('支付成功，订单已进入待发货');
        go('orders');
      } catch (saveError) {
        alert(saveError.message || '订单支付失败');
        await refreshPersistedEntities({ users: true, orders: true, products: true });
        var refreshedOrder = orders.find(function (item) { return item.id === currentCheckoutOrder.id; });
        currentCheckoutOrder = refreshedOrder ? normalizeOrderSnapshot(refreshedOrder) : null;
        return;
      }
    }

    function payOrder(idx) {
      var order = orders[idx];
      if (!order) return;
      currentCheckoutOrder = normalizeOrderSnapshot(order);
      pushView('payment');
    }

    function cancelOrder(idx) {
      if (!confirm('确定要取消订单吗?')) return;
      var order = orders[idx];
      if (!order) return;
      if (order.status !== 'pending') {
        updateOrderStatusOnServer(user, order.id, 'cancelled', order.trackingNo || '', { refreshUsers: true, refreshOrders: true }).then(function () {
          go('orders');
        }).catch(function (error) {
          alert(error.message || '取消订单失败');
        });
        return;
      }
      cancelPendingOrderOnServer(user, order.id).then(async function (saved) {
        orders = upsertRecordById(orders.map(normalizeOrderSnapshot), saved).map(normalizeOrderSnapshot).sort(function (a, b) {
          return Number(b.time || 0) - Number(a.time || 0);
        });
        if (currentCheckoutOrder && currentCheckoutOrder.id === saved.id) currentCheckoutOrder = normalizeOrderSnapshot(saved);
        await refreshPersistedEntities({ users: true, orders: true, products: true });
        go('orders');
      }).catch(function (error) {
        alert(error.message || '取消订单失败');
      });
    }

    function requestRefund(idx) {
      var order = orders[idx];
      if (!order) return;
      var latestRefund = getLatestRefundRequest(order.id, user);
      if (latestRefund && latestRefund.status === 'pending') {
        alert('该订单已有待处理退款申请');
        return;
      }
      var message = order.status === 'shipped' ? '请输入退款原因，提交后等待管理员审核。' : '请输入退款原因，提交后等待管理员审核。';
      var reason = window.prompt(message, latestRefund && latestRefund.reason ? latestRefund.reason : '');
      if (reason === null) return;
      if (!String(reason || '').trim()) {
        alert('请先填写退款原因');
        return;
      }
      submitRefundRequestToServer(user, order.id, reason).then(async function () {
        await refreshPersistedEntities({ users: true, orders: true, refunds: true, ledgers: currentAdminTab === 'refund' });
        alert('退款申请已提交');
        render();
      }).catch(function (error) {
        alert(error.message || '退款申请提交失败');
      });
    }

    function confirmOrder(idx) {
      var order = orders[idx];
      if (!order) return;
      updateOrderStatusOnServer(user, order.id, 'done', order.trackingNo || '', { refreshUsers: true, refreshOrders: true }).then(function () {
        alert('已确认收货!');
        render();
      }).catch(function (error) {
        alert(error.message || '确认收货失败');

    function handleRouteChange() {
      applyRouteFromHash();
      if (view === 'admin') {
        if (canAccessAdminPanel()) { showAdminPanel(); }

        else { alert('您尚未获得管理端权限'); go('profile'); }

        else { alert('您尚未获得农户权限'); go('profile'); }

        document.getElementById('admin-panel') && document.getElementById('admin-panel').classList.add('hidden');

    // [BOOTSTRAP] 页面刷新后的初始化顺序、首屏兜底数据和重新拉库都从 initApp 进入。
    // 初始化先用本地默认数据首屏渲染，避免任一接口慢响应时页面长期停在加载态。
    async function initApp() {
      loadData();
      if (!location.hash) location.hash = '/home';
      setProds(PRODUCTS);
      setCategories(createDefaultCategories());
      setBanners(BANNERS);
      setAnnouncements(ANNOUNCEMENTS);
      setCouponTemplates(createDefaultCouponTemplates());
      try {
        await fetchCurrentUserSession();
      } catch (userError) {
        console.error(userError);
      }
      if (user) {
        try {
          await fetchUsers();
        } catch (userListError) {
          console.error(userListError);
        }
      }
      handleRouteChange();
      try {
        var bootstrapTasks = [fetchProducts(), fetchCategories(), fetchBanners(), fetchAnnouncements(), fetchCouponTemplates()];
        if (user) bootstrapTasks.push(fetchUsers());
        if (user) bootstrapTasks.push(fetchBuyerOrdersPage(1));
        await Promise.all(bootstrapTasks);
        handleRouteChange();
      } catch (error) {
        console.error(error);
        handleRouteChange();
        alert(error.message || '部分数据加载失败，当前先展示默认内容，请确认后端服务已启动');
      }
    }

    initApp();
    // 某些浏览器在直接刷新 hash 路由页时会晚一点恢复地址状态，这里补一次兜底渲染，避免首屏空白。
    setTimeout(handleRouteChange, 0);
    window.addEventListener('load', function () {
      handleRouteChange();
    });

    // 手机硬件返回键：统一通过 hash 路由切换普通端、管理端和农户端。

    // ===== 权限体系 =====
    // [ACCESS_CONTROL] 登录角色、管理端/农户端准入、用户列表聚合在这里统一判断。
    function getUserRole() {
      if (!user) return { isFarmer: false, isAdmin: false, isSuperAdmin: false, farmerName: '' };
      var meta = getUserMeta(user);
      return normalizeRoleFlags(user, Object.assign({ isFarmer: false, isAdmin: false, isSuperAdmin: false, farmerName: user }, meta.roles || {}));
    }
    function canAccessAdminPanel() {
      var role = getUserRole();
      return !!(role.isAdmin || role.isSuperAdmin);
    }
    function canManageAuth() {
      return !!getUserRole().isSuperAdmin;
    }
    function canAccessFarmerPanel() {
      var role = getUserRole();
      return !!(role.isFarmer || role.isSuperAdmin);
    }
    function getAllUsers() {
      return Object.keys(usersState).map(function (uname) {
        var record = normalizeUserRecord(usersState[uname]);
        return { id: record.id, username: uname, roles: record.roles || { isFarmer: false, isAdmin: false, isSuperAdmin: false }, createdAt: record.createdAt || '' };
      });
    }
    async function updateUserRole(uname, roleType) {
      if (!canManageAuth()) {
        alert('只有超级管理员可以管理账号授权');
        return;
      }
      try {
        var response = await fetch('/api/users/' + encodeURIComponent(uname) + '/role', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ roleType: roleType })
        });
        if (!response.ok) throw new Error('权限保存失败');
        var saved = normalizeUserRecord(await response.json());
        usersState[uname] = saved;
        if (user === uname) {
          cart = saved.cart || [];
          orders = saved.orders || [];
          member = saved.member || member;
        }
        await loadAdminAuthWorkspace(adminUserListState.meta.page || 1);
      } catch (error) {
        alert(error.message || '权限保存失败');
      }
    }

    async function deleteUserAccountFromAdmin(uname) {
      if (!canManageAuth()) {
        alert('只有超级管理员可以删除用户');
        return;
      }
      if (!confirm('确认删除用户 ' + uname + ' 吗？删除后会清空该用户资料，仅保留订单快照。')) return;
      try {
        var response = await fetch('/api/users/' + encodeURIComponent(uname), {
          method: 'DELETE'
        });
        if (!response.ok) {
          var errorPayload = await response.json().catch(function () { return { message: '删除用户失败' }; });
          throw new Error((errorPayload && errorPayload.message) || '删除用户失败');
        }
        await response.json();
        await refreshPersistedEntities({ users: true, orders: true, products: true });
        renderAdminAuth();
        renderAdminOd();
        renderAdminDb();
        alert('用户已删除，订单快照已保留');
      } catch (error) {
        alert(error.message || '删除用户失败');
      }
    }

      var order = getAllOrders().find(function (item) { return item.owner === owner && item.id === id; });
      if (!order) return;
      var trackingNo = order.trackingNo || '';
      if (status === 'shipped') {
        var promptValue = window.prompt('请输入物流编号', trackingNo);
        if (promptValue === null) {
          renderAdminOd();
          return;
        }
        trackingNo = String(promptValue || '').trim();
        if (!trackingNo) {
          alert('请先填写物流编号');
          renderAdminOd();
          return;
        }
      }
      try {
        await updateOrderStatusOnServer(owner, id, status, trackingNo, { refreshUsers: true, refreshOrders: true });
      } catch (error) {

    function hasCategoryFormContent(prefix) {
      var nameInput = document.getElementById(prefix + '-name');
      if (!nameInput) return false;
      return hasAnyFilledValue([
        nameInput.value,
        hasFileSelection(prefix + '-icon') ? 'file' : ''
      ]);
    }

    function readCategoryForm(prefix, fallback) {
      var base = fallback || createCategoryDraft();
      return normalizeCategory({
        id: base.id || (document.getElementById(prefix + '-id') || {}).value || '',
        name: ((document.getElementById(prefix + '-name') || {}).value || '').trim(),
        icon: base.icon || '🧺',
        sortOrder: Number(base.sortOrder || 0),
        showOnHome: !!((document.getElementById(prefix + '-show-on-home') || {}).checked)
      }, Number(base.sortOrder || 0));
    }

    function validateCategoryPayload(payload) {
      if (!payload.name) return '请填写分类名称';
      return '';
    }

    async function getCategoryIconFromInputAsync(prefix, fallbackIcon) {
      return new Promise(function (resolve, reject) {
        getProcessedImageFromInput(prefix + '-icon', fallbackIcon || '🧺', 'categories', function (file) {
          return compressImageFileToDataUrl(file, { maxSize: 128, quality: 0.82, mimeType: 'image/webp' });
        }, 'category-icon.webp', resolve, reject);
      });
    }

    async function saveExistingCategory(categoryId, options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true, collapseAfterSave: true }, options || {});
      var categories = getCategories();
      var current = categories.find(function (item) { return item.id === categoryId; });
      if (!current || !document.getElementById('category-' + categoryId + '-name')) return false;
      var payload = readCategoryForm('category-' + categoryId, current);
      var error = validateCategoryPayload(payload);
      if (error) {
        if (config.alertInvalid) alert(error);
        return false;
      }
      try {
        payload.icon = await getCategoryIconFromInputAsync('category-' + categoryId, current.icon || '🧺');
        var nextList = categories.map(function (item) {
          return item.id === categoryId ? Object.assign({}, payload, { id: current.id, sortOrder: item.sortOrder }) : item;
        });
        await saveCategoriesToServer(nextList);
        if (config.collapseAfterSave) currentCategoryEditId = '';
        if (config.rerenderAfterSave) renderAdminCategory();
        if (config.alertSuccess) alert('商品分类已保存');
        return true;
      } catch (errorSave) {
        if (config.alertInvalid) alert(errorSave.message || '商品分类保存失败');
        return false;
      }
    }

    async function saveNewCategory(options) {
      var config = Object.assign({ alertInvalid: true, alertSuccess: true, rerenderAfterSave: true }, options || {});
      if (!hasCategoryFormContent('new-category')) return false;
      var payload = readCategoryForm('new-category', createCategoryDraft({ sortOrder: getCategories().length }));
      var error = validateCategoryPayload(payload);
      if (error) {
        if (config.alertInvalid) alert(error);
        return false;
      }
      try {
        payload.id = payload.id || buildCategoryId(payload.name, getCategories().length) + '_' + Date.now();
        payload.icon = await getCategoryIconFromInputAsync('new-category', payload.icon || '🧺');
        var nextList = getCategories().slice();
        nextList.push(Object.assign({}, payload, { sortOrder: nextList.length }));
        await saveCategoriesToServer(nextList);
        currentCategoryEditId = '';
        if (config.rerenderAfterSave) renderAdminCategory();
        if (config.alertSuccess) alert('商品分类已新增');
        return true;
      } catch (errorSave) {
        if (config.alertInvalid) alert(errorSave.message || '商品分类新增失败');
        return false;
      }
    }

    function moveCategory(index, delta) {
      var categories = getCategories().slice();
      var target = index + delta;
      if (target < 0 || target >= categories.length) return;
      var current = categories[index];
      categories[index] = categories[target];
      categories[target] = current;
      saveCategoriesToServer(categories).then(function () {
        renderAdminCategory();
      }).catch(function (error) {
        alert(error.message || '商品分类排序失败');
      });
    }

    function deleteCategory(categoryId) {
      if (getCategories().length <= 1) {
        alert('至少保留 1 个商品分类');
        return;
      }
      var usageCount = getCategoryUsageCount(categoryId);
      if (usageCount > 0) {
        alert('请先把该分类下的 ' + usageCount + ' 个商品改到其他分类，再删除这个分类');
        return;
      }
      if (!confirm('确认删除这个商品分类吗？')) return;
      var nextList = getCategories().filter(function (item) { return item.id !== categoryId; });
      saveCategoriesToServer(nextList).then(function () {
        if (currentCategoryEditId === categoryId) currentCategoryEditId = '';
        renderAdminCategory();
      }).catch(function (error) {
        alert(error.message || '商品分类删除失败');
      });
    }

    async function autoSaveCurrentCategoryEditor() {
      if (currentCategoryEditId === 'new') {
        return saveNewCategory({ alertInvalid: false, alertSuccess: false, rerenderAfterSave: false });
      }
      if (currentCategoryEditId) {
        return saveExistingCategory(currentCategoryEditId, { alertInvalid: false, alertSuccess: false, rerenderAfterSave: false, collapseAfterSave: false });
      }
      return false;
    }

      }).join('') : '<div class="bg-white rounded-xl p-4 shadow text-sm text-gray-400">暂无分类，先新增一个吧</div>';
